<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EduLeave</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .form-icon {
            text-align: center;
            margin-bottom: 1rem;
        }
        .icon-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.3);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="form-icon">
            <div class="icon-circle">🔐</div>
        </div>
        <h2>Welcome </h2>
        <p style="margin-bottom: 1rem; color: #4B5563; text-align: left;">Sign in to manage leaves</p>

        <input type="email" id="loginEmail" placeholder="Email address">
        <input type="password" id="loginPassword" placeholder="Password">

        <button onclick="login()">Login →</button>

        <p style="text-align: center; margin-top: 1.5rem;">Don't have an account? <a href="register.html">Create account</a></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
