<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login | EduLeave</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='68' text-anchor='middle' font-size='50'%3E🔐%3C/text%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }
        .login-container { max-width: 420px; width: 100%; margin: 0 auto; }
        .box {
            background: #1e1e1e;
            border-radius: 2rem;
            padding: 2rem 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: transform 0.3s ease;
        }
        .box:hover { transform: translateY(-3px); }
        .icon-circle {
            width: 70px; height: 70px;
            background: #2da44e;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        h2 {
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            color: #ffffff;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }
        .subtitle {
            text-align: center;
            color: #a1a1aa;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            padding: 14px 18px;
            margin: 10px 0;
            border: 1.5px solid #2a2a2a;
            border-radius: 44px;
            font-size: 0.95rem;
            background: #2a2a2a;
            color: #ffffff;
            outline: none;
            transition: all 0.2s ease;
        }
        input::placeholder { color: #6b7280; font-weight: 400; }
        input:focus {
            border-color: #2da44e;
            background: #333333;
            box-shadow: 0 0 0 3px rgba(45, 164, 78, 0.15);
        }
        button {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: #2da44e;
            border: none;
            border-radius: 44px;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        button:hover { background: #2c974b; transform: scale(0.98); }
        .forgot-link {
            text-align: right;
            margin-top: 5px;
            margin-bottom: 5px;
        }
        .forgot-link a {
            color: #9ca3af;
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.2s;
        }
        .forgot-link a:hover { color: #2da44e; }
        .footer-text {
            text-align: center;
            margin-top: 1.5rem;
            color: #6b7280;
            font-size: 0.85rem;
        }
        .footer-text a {
            color: #2da44e;
            text-decoration: none;
            font-weight: 500;
        }
        .footer-text a:hover { text-decoration: underline; }
        
        .error-msg {
            color: #f87171;
            font-size: 0.8rem;
            text-align: center;
            margin-top: 12px;
            padding: 10px;
            background: rgba(248, 113, 113, 0.1);
            border-radius: 12px;
            display: none;
        }
        .error-msg.show { display: block; }
        
        .text-center { text-align: center; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: #1e1e1e;
            border-radius: 1.5rem;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-content h3 {
            color: white;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            text-align: center;
        }
        .modal-content p {
            color: #9ca3af;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .modal-content input { margin-bottom: 1rem; }
        .modal-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }
        .modal-buttons button { flex: 1; margin-top: 0; }
        .btn-cancel { background: #3a3a3a; }
        .btn-cancel:hover { background: #4a4a4a; transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="box" id="loginBox">
            <div class="text-center">
                <div class="icon-circle">
                    <i class="fas fa-lock"></i>
                </div>
            </div>
            <h2>Welcome</h2>
            <p class="subtitle">Sign in to manage your leaves</p>
            
            <input type="email" id="loginEmail" placeholder="Email address">
            <input type="password" id="loginPassword" placeholder="Password">
            
            <div class="forgot-link">
                <a href="#" onclick="showForgotPasswordModal()">Forgot password?</a>
            </div>
            
            <div id="loginError" class="error-msg"></div>
            <button onclick="login()">
                <span>Login</span>
                <i class="fas fa-arrow-right" style="font-size: 0.85rem;"></i>
            </button>
            
            <p class="footer-text">
                Don't have an account? <a href="register.html">Create account</a>
            </p>
        </div>
    </div>
    
    <!-- Forgot Password Modal -->
    <div id="forgotPasswordModal" class="modal">
        <div class="modal-content">
            <h3><i class="fas fa-key"></i> Reset Password</h3>
            <p>Enter your email address and we'll send you a password reset link.</p>
            <input type="email" id="resetEmail" placeholder="Email address">
            <div id="resetError" class="error-msg"></div>
            <div id="resetSuccess" class="success-msg"></div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeForgotPasswordModal()">Cancel</button>
                <button onclick="sendPasswordReset()">Send Reset Link</button>
            </div>
        </div>
    </div>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBtQx8RJ3QbAAxZOwthz4YqWeq-DOC5rGg",
            authDomain: "eduleave-system.firebaseapp.com",
            projectId: "eduleave-system",
            storageBucket: "eduleave-system.firebasestorage.app",
            messagingSenderId: "311349906309",
            appId: "1:311349906309:web:bf5391e233cd186943d2ec"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        
        window.login = async function() {
            let email = document.getElementById("loginEmail").value.trim();
            let password = document.getElementById("loginPassword").value;
            let errorDiv = document.getElementById("loginError");
            
            errorDiv.classList.remove("show");
            errorDiv.innerText = "";
            
            if (!email || !password) {
                errorDiv.innerText = "Please fill all fields!";
                errorDiv.classList.add("show");
                return;
            }
            
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // NO EMAIL VERIFICATION CHECK - directly allow login
                // if (!user.emailVerified) {
                //     errorDiv.innerHTML = "❌ Email not verified! Please check your inbox.";
                //     errorDiv.classList.add("show");
                //     await auth.signOut();
                //     return;
                // }
                
                const userDoc = await db.collection("users").doc(user.uid).get();
                const userData = userDoc.data();
                
                if (!userData) throw new Error("User data not found!");
                
                sessionStorage.setItem("currentUser", JSON.stringify({
                    id: user.uid,
                    name: userData.name,
                    email: user.email,
                    role: userData.role
                }));
                
                if (userData.role === "admin") {
                    window.location.href = "admin.html";
                } else {
                    window.location.href = "home.html";
                }
            } catch (error) {
                if (error.code === 'auth/user-not-found') {
                    errorDiv.innerText = "No user found with this email!";
                } else if (error.code === 'auth/wrong-password') {
                    errorDiv.innerText = "Wrong password! Please try again.";
                } else if (error.code === 'auth/invalid-email') {
                    errorDiv.innerText = "Invalid email format!";
                } else if (error.code === 'auth/too-many-requests') {
                    errorDiv.innerText = "Too many failed attempts. Try again later.";
                } else {
                    errorDiv.innerText = error.message;
                }
                errorDiv.classList.add("show");
            }
        };
        
        window.showForgotPasswordModal = function() {
            document.getElementById("forgotPasswordModal").style.display = "flex";
            document.getElementById("resetEmail").value = "";
            document.getElementById("resetError").innerText = "";
            document.getElementById("resetSuccess").innerHTML = "";
            document.getElementById("resetError").classList.remove("show");
            document.getElementById("resetSuccess").classList.remove("show");
        };
        
        window.closeForgotPasswordModal = function() {
            document.getElementById("forgotPasswordModal").style.display = "none";
        };
        
        window.sendPasswordReset = async function() {
            let email = document.getElementById("resetEmail").value.trim();
            let errorDiv = document.getElementById("resetError");
            let successDiv = document.getElementById("resetSuccess");
            
            errorDiv.innerText = "";
            successDiv.innerHTML = "";
            errorDiv.classList.remove("show");
            successDiv.classList.remove("show");
            
            if (!email) {
                errorDiv.innerText = "Please enter your email address!";
                errorDiv.classList.add("show");
                return;
            }
            
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email)) {
                errorDiv.innerText = "Please enter a valid email address!";
                errorDiv.classList.add("show");
                return;
            }
            
            try {
                await auth.sendPasswordResetEmail(email);
                successDiv.innerHTML = "✅ Password reset link sent! Check your email.";
                successDiv.classList.add("show");
                setTimeout(() => {
                    closeForgotPasswordModal();
                }, 3000);
            } catch (error) {
                if (error.code === 'auth/user-not-found') {
                    errorDiv.innerText = "No account found with this email address!";
                } else if (error.code === 'auth/invalid-email') {
                    errorDiv.innerText = "Invalid email address!";
                } else {
                    errorDiv.innerText = error.message;
                }
                errorDiv.classList.add("show");
            }
        };
        
        document.getElementById("loginPassword")?.addEventListener("keypress", function(e) {
            if (e.key === "Enter") login();
        });
        
        document.getElementById("resetEmail")?.addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendPasswordReset();
        });
        
        document.getElementById("loginEmail")?.addEventListener("input", function() {
            document.getElementById("loginError").classList.remove("show");
        });
        
        document.getElementById("loginPassword")?.addEventListener("input", function() {
            document.getElementById("loginError").classList.remove("show");
        });
    </script>
</body>
</html>
