<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login | EduLeave</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='68' text-anchor='middle' font-size='50'%3E🔐%3C/text%3E%3C/svg%3E">
    <style>
        /* Login page specific */
        .login-container {
            max-width: 420px;
            margin: 0 auto;
            width: 100%;
        }
        .icon-circle {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #2da44e, #216e39);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }
        @media (max-width: 480px) {
            .icon-circle {
                width: 60px;
                height: 60px;
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="box text-center">
            <div class="form-icon mb-2">
                <div class="icon-circle">🔐</div>
            </div>
            <h2 class="mb-1">Welcome Back</h2>
            <p class="text-gray mb-3">Sign in to manage leaves</p>
            
            <input type="email" id="loginEmail" placeholder="Email address" class="mb-2">
            <input type="password" id="loginPassword" placeholder="Password" class="mb-2">
            <div id="loginError" class="error-msg"></div>
            
            <button onclick="login()" class="mt-2">Login →</button>
            
            <p class="text-gray mt-3">Don't have an account? <a href="register.html">Create account</a></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
