<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login | EduLeave</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='68' text-anchor='middle' font-size='50'%3E🔐%3C/text%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }
        .login-container { max-width: 420px; width: 100%; margin: 0 auto; }
        .box {
            background: #1e1e1e;
            border-radius: 2rem;
            padding: 2rem 1.8rem;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s ease;
        }
        .box:hover { transform: translateY(-3px); }
        .icon-circle {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, #2da44e, #216e39);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        h2 { font-size: 1.8rem; font-weight: 700; text-align: center; color: #ffffff; margin-bottom: 0.5rem; }
        .subtitle { text-align: center; color: #ffffff; margin-bottom: 1.5rem; font-size: 0.9rem; }
        input {
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0;
            border: 1.5px solid #333;
            border-radius: 40px;
            font-size: 1rem;
            background: #2a2a2a;
            color: #ffffff;
            outline: none;
        }
        input::placeholder { color: #bbbbbb; }
        input:focus { border-color: #048428; }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 18px;
            background: #029f2e;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #049d2f; transform: scale(0.98); }
        .footer-text { text-align: center; margin-top: 1.5rem; color: #ffffff; font-size: 0.85rem; }
        .footer-text a { color: #4ade80; text-decoration: none; font-weight: 600; }
        .error-msg { color: #f87171; font-size: 0.8rem; text-align: center; margin-top: 10px; }
        .text-center { text-align: center; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="box">
            <div class="text-center"><div class="icon-circle"><i class="fas fa-lock"></i></div></div>
            <h2>Welcome Back</h2>
            <p class="subtitle">Sign in to manage your leaves</p>
            <input type="email" id="loginEmail" placeholder="Email address">
            <input type="password" id="loginPassword" placeholder="Password">
            <div id="loginError" class="error-msg"></div>
            <button onclick="login()">Login <i class="fas fa-arrow-right"></i></button>
            <p class="footer-text">Don't have an account? <a href="register.html">Create account</a></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
