<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | EduLeave</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%); font-family: 'Inter', sans-serif; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: white; padding: 12px 20px; border-radius: 12px; margin-bottom: 20px; }
        .logo { font-size: 18px; font-weight: bold; color: #1a1a2e; }
        .user-avatar { width: 36px; height: 36px; background: linear-gradient(135deg, #2da44e, #216e39); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .logout-btn { background: #dc3545; border: none; padding: 6px 12px; border-radius: 8px; color: white; cursor: pointer; }
        .btn-home { background: #4f46e5; border: none; padding: 8px 16px; border-radius: 8px; color: white; cursor: pointer; margin-bottom: 15px; display: inline-block; }
        .welcome-card { background: white; border-radius: 12px; padding: 15px 20px; margin-bottom: 20px; }
        .welcome-text { color: #2da44e; font-weight: 500; }
        .form-card { background: white; border-radius: 12px; padding: 20px; }
        .form-title { font-size: 18px; font-weight: 600; margin-bottom: 15px; border-bottom: 2px solid #2da44e; padding-bottom: 8px; display: inline-block; }
        .input-field { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px; font-size: 14px; }
        .input-field:focus { border-color: #2da44e; outline: none; }
        .date-group { display: flex; gap: 15px; margin-bottom: 12px; }
        .date-field { flex: 1; }
        .date-field label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
        .btn-submit { background: linear-gradient(135deg, #2da44e, #216e39); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: 500; margin-top: 10px; }
        .btn-submit:hover { transform: scale(0.98); }
        .fraud-warning { background: #fff3cd; border-left: 4px solid #f59e0b; padding: 12px; border-radius: 8px; margin-top: 10px; font-size: 12px; display: none; }
        .warning-text { color: #856404; }
        @media (max-width: 550px) { .date-group { flex-direction: column; gap: 0; } body { padding: 10px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div class="logo"><i class="fas fa-clipboard-list"></i> Leave Management</div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <div class="user-avatar" id="userAvatar"></div>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
        
        <button class="btn-home" onclick="location.href='home.html'"><i class="fas fa-arrow-left"></i> Home</button>
        
        <div class="welcome-card"><div class="welcome-text" id="welcomeUser"></div></div>
        
        <div class="form-card">
            <div class="form-title"><i class="fas fa-pen-alt"></i> Apply for Leave</div>
            
            <select id="department" class="input-field">
                <option value="">Select Department</option>
                <option value="CSE">CSE</option><option value="EEE">EEE</option><option value="BBA">BBA</option>
                <option value="LLB">LLB</option><option value="CEN">CEN</option><option value="TEX">TEX</option>
            </select>
            
            <input type="text" id="studentName" placeholder="Your Name" class="input-field">
            
            <select id="adminSelect" class="input-field">
                <option value="">Select Administrator</option>
            </select>
            
            <select id="leaveType" class="input-field">
                <option>Sick Leave</option><option>Casual Leave</option><option>Emergency Leave</option><option>Annual Leave</option>
            </select>
            
            <div class="date-group">
                <div class="date-field"><label>Start Date</label><input type="date" id="fromDate" class="input-field" style="margin-bottom:0;"></div>
                <div class="date-field"><label>End Date</label><input type="date" id="toDate" class="input-field" style="margin-bottom:0;"></div>
            </div>
            <div id="dateError" style="color:#dc3545; font-size:12px; margin-bottom:10px;"></div>
            
            <textarea id="leaveReason" placeholder="Reason for leave..." class="input-field" style="min-height:80px;"></textarea>
            
            <div id="fraudWarning" class="fraud-warning"></div>
            
            <button class="btn-submit" onclick="submitLeaveWithML()"><i class="fas fa-paper-plane"></i> Submit Leave Request</button>
        </div>
    </div>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBtQx8RJ3QbAAxZOwthz4YqWeq-DOC5rGg",
            authDomain: "eduleave-system.firebaseapp.com",
            projectId: "eduleave-system",
            storageBucket: "eduleave-system.firebasestorage.app",
            messagingSenderId: "311349906309",
            appId: "1:311349906309:web:bf5391e233cd186943d2ec"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        
        window.logout = async function() {
            try { await auth.signOut(); } catch(e) {}
            sessionStorage.removeItem("currentUser");
            window.location.href = "index.html";
        };
        
        window.loadAdmins = async function(department) {
            if (!department) return;
            const adminsSnapshot = await db.collection("users").where("role", "==", "admin").where("department", "==", department).get();
            const adminSelect = document.getElementById("adminSelect");
            adminSelect.innerHTML = '<option value="">Select Administrator</option>';
            adminsSnapshot.forEach(doc => {
                const admin = doc.data();
                adminSelect.innerHTML += `<option value="${admin.email}|${admin.name}">${admin.name}</option>`;
            });
        };
        
        // ============ FRAUD DETECTION API CALL FUNCTIONS ============
        
        // Get reason code based on leave type
        function getReasonCode(type) {
            const map = {
                'Sick Leave': 13,
                'Casual Leave': 23,
                'Emergency Leave': 26,
                'Annual Leave': 14
            };
            return map[type] || 0;
        }
        
        // Get season based on date
        function getSeason(date) {
            const month = new Date(date).getMonth() + 1;
            if (month >= 3 && month <= 5) return 1;  // Spring
            if (month >= 6 && month <= 8) return 2;  // Summer
            if (month >= 9 && month <= 11) return 3; // Fall
            return 4; // Winter
        }
        
        // Call ML API for fraud detection
        async function checkFraudWithML(leaveData) {
            try {
                const response = await fetch('http://127.0.0.1:5000/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        reason: getReasonCode(leaveData.type),
                        month: new Date(leaveData.fromDate).getMonth() + 1,
                        day: new Date(leaveData.fromDate).getDay(),
                        seasons: getSeason(leaveData.fromDate),
                        distance: 20,
                        service_time: 5,
                        age: 25,
                        work_load: 100,
                        hit_target: 0
                    })
                });
                
                const result = await response.json();
                console.log("ML API Response:", result);
                return result;
            } catch (error) {
                console.error("ML API Error:", error);
                // Return null if API is not available
                return null;
            }
        }
        
        // Rule-based fraud detection (already in script.js)
        async function getUserLeaveHistory(userEmail) {
            const leavesSnapshot = await db.collection("leaves")
                .where("userEmail", "==", userEmail)
                .get();
            const leaves = [];
            leavesSnapshot.forEach(doc => leaves.push(doc.data()));
            return leaves;
        }
        
        function analyzeLeaveRequest(leaveData, userHistory) {
            let suspiciousScore = 0;
            let detectionReasons = [];
            
            const fromDate = new Date(leaveData.fromDate);
            const toDate = new Date(leaveData.toDate);
            const dayOfWeek = fromDate.getDay();
            const durationDays = Math.ceil((toDate - fromDate) / (1000 * 60 * 60 * 24)) + 1;
            
            const leavesInLast30Days = userHistory.filter(l => {
                const leaveDate = new Date(l.fromDate);
                const daysDiff = (new Date() - leaveDate) / (1000 * 60 * 60 * 24);
                return daysDiff <= 30;
            }).length;
            
            if (leavesInLast30Days >= 3) {
                suspiciousScore += 30;
                detectionReasons.push("3+ leaves in last 30 days");
            }
            if (dayOfWeek === 5 || dayOfWeek === 6) {
                suspiciousScore += 20;
                detectionReasons.push("Leave starts on weekend");
            }
            if (dayOfWeek === 1 || dayOfWeek === 5) {
                suspiciousScore += 15;
                detectionReasons.push("Long weekend creation attempt");
            }
            const daysUntilLeave = Math.ceil((fromDate - new Date()) / (1000 * 60 * 60 * 24));
            if (daysUntilLeave <= 1 && daysUntilLeave >= 0) {
                suspiciousScore += 25;
                detectionReasons.push("Last minute leave request");
            }
            if (durationDays > 7) {
                suspiciousScore += 15;
                detectionReasons.push(`Unusually long leave (${durationDays} days)`);
            }
            
            return {
                suspiciousScore: Math.min(suspiciousScore, 100),
                detectionReasons: detectionReasons,
                isSuspicious: suspiciousScore >= 30
            };
        }
        
        // Main submit function with ML integration
        window.submitLeaveWithML = async function() {
            const user = auth.currentUser;
            if (!user) { alert("Please login again"); window.location.href = "index.html"; return; }
            
            const userDoc = await db.collection("users").doc(user.uid).get();
            const userData = userDoc.data();
            
            let department = document.getElementById("department").value;
            let name = document.getElementById("studentName").value.trim();
            let adminValue = document.getElementById("adminSelect").value;
            let [adminEmail, adminName] = adminValue ? adminValue.split("|") : [];
            let type = document.getElementById("leaveType").value;
            let from = document.getElementById("fromDate").value;
            let to = document.getElementById("toDate").value;
            let reason = document.getElementById("leaveReason").value.trim();
            
            if (!department || !name || !adminEmail || !from || !to || !reason) {
                alert("Please fill all fields!");
                return;
            }
            if (new Date(from) > new Date(to)) {
                document.getElementById("dateError").innerHTML = "End date cannot be before start date!";
                return;
            }
            
            // Run ML Fraud Detection
            let mlResult = null;
            let fraudRisk = "Low";
            let suspiciousScore = 0;
            let detectionReasons = [];
            
            try {
                mlResult = await checkFraudWithML({
                    type: type,
                    fromDate: from,
                    toDate: to,
                    reason: reason
                });
                
                if (mlResult && mlResult.success) {
                    fraudRisk = mlResult.risk_level;
                    suspiciousScore = Math.round(mlResult.fraud_probability * 100);
                    if (mlResult.prediction === 1) {
                        detectionReasons.push(`ML Model detected ${fraudRisk} risk (${suspiciousScore}% probability)`);
                    }
                }
            } catch(e) {
                console.log("ML API not available, using rule-based only");
            }
            
            // Get user's leave history for rule-based detection
            const leaveHistory = await getUserLeaveHistory(user.email);
            const ruleAnalysis = analyzeLeaveRequest({ fromDate: from, toDate: to, type: type, reason: reason }, leaveHistory);
            
            // Combine ML and rule-based scores
            const finalScore = mlResult ? Math.min((ruleAnalysis.suspiciousScore + suspiciousScore) / 2, 100) : ruleAnalysis.suspiciousScore;
            const finalRisk = finalScore >= 50 ? "High" : (finalScore >= 25 ? "Medium" : "Low");
            const allReasons = [...ruleAnalysis.detectionReasons, ...detectionReasons];
            
            // Show warning if fraud detected
            if (finalRisk === "High" || (mlResult && mlResult.prediction === 1)) {
                const warningDiv = document.getElementById("fraudWarning");
                warningDiv.style.display = "block";
                warningDiv.innerHTML = `<div class="warning-text">
                    <strong>⚠️ Fraud Detection Alert!</strong><br>
                    Risk Level: ${finalRisk}<br>
                    Fraud Score: ${finalScore}/100<br>
                    Reasons: ${allReasons.join(', ')}<br>
                    <small>This request has been flagged for admin review.</small>
                </div>`;
                
                const userConfirmed = confirm(`⚠️ FRAUD DETECTION WARNING!\n\nRisk Level: ${finalRisk}\nFraud Score: ${finalScore}/100\n\nReasons:\n• ${allReasons.join('\n• ')}\n\nDo you still want to submit this request?`);
                if (!userConfirmed) {
                    return;
                }
            }
            
            const requestData = {
                userName: name,
                userEmail: user.email,
                department: department,
                batch: userData.batch || "",
                studentId: userData.studentId || "",
                fromDate: from,
                toDate: to,
                reason: reason,
                type: type,
                adminEmail: adminEmail,
                adminName: adminName,
                status: "Pending",
                timestamp: new Date().toISOString(),
                suspiciousScore: finalScore,
                fraudRisk: finalRisk,
                detectionReasons: allReasons,
                mlFraudProbability: suspiciousScore
            };
            
            try {
                await db.collection("leaves").add(requestData);
                
                await db.collection("notifications").add({
                    type: "leave",
                    userName: name,
                    userEmail: user.email,
                    department: department,
                    adminEmail: adminEmail,
                    requestId: Date.now().toString(),
                    details: `${type} | ${from} → ${to}`,
                    reason: reason,
                    fraudRisk: finalRisk,
                    suspiciousScore: finalScore,
                    isRead: false,
                    timestamp: new Date().toISOString()
                });
                
                let successMsg = "✅ Leave request submitted! Admin will be notified.";
                if (finalRisk === "High") {
                    successMsg += `\n⚠️ Marked as High Risk (Score: ${finalScore}/100)`;
                }
                alert(successMsg);
                
                document.getElementById("fromDate").value = "";
                document.getElementById("toDate").value = "";
                document.getElementById("leaveReason").value = "";
                document.getElementById("dateError").innerHTML = "";
                document.getElementById("fraudWarning").style.display = "none";
                
            } catch(e) { 
                console.error("Submit error:", e);
                alert("Failed to submit!"); 
            }
        };
        
        document.getElementById("department")?.addEventListener("change", function() {
            loadAdmins(this.value);
        });
        
        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = "index.html"; return; }
            const userDoc = await db.collection("users").doc(user.uid).get();
            const userData = userDoc.data();
            if (!userData) { window.location.href = "index.html"; return; }
            if (userData.role === "admin") { window.location.href = "admin.html"; return; }
            
            document.getElementById("userAvatar").innerHTML = userData.name.charAt(0).toUpperCase();
            document.getElementById("welcomeUser").innerHTML = `Welcome, ${userData.name}!`;
            document.getElementById("studentName").value = userData.name;
            
            if (userData.department) {
                document.getElementById("department").value = userData.department;
                loadAdmins(userData.department);
            }
        });
    </script>
</body>
</html>
