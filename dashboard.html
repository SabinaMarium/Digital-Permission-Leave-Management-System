<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard | EduLeave</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .date-group {
            display: flex;
            gap: 15px;
            margin: 10px 0;
        }
        .date-field {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .date-field label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #4B5563;
            margin-bottom: 4px;
            margin-left: 4px;
        }
        .date-field input {
            width: 100%;
            margin: 0;
        }
        textarea {
            width: 100%;
            padding: 12px 14px;
            margin: 8px 0;
            border: 1.5px solid #E2E8F0;
            border-radius: 20px;
            font-size: 0.95rem;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
            transition: all 0.2s;
            outline: none;
        }
        textarea:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }
        .error-msg {
            color: #EF4444;
            font-size: 0.7rem;
            margin-top: 4px;
            display: block;
        }
        .leave-card {
            background: #F8FAFE;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 4px solid #8b5cf6;
            transition: all 0.2s;
        }
        .leave-card:hover {
            transform: translateX(3px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .leave-reason {
            font-size: 0.8rem;
            color: #4B5563;
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px dashed #E2E8F0;
        }
        .status-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-left: 8px;
        }
        .status-pending {
            background: #FEF3C7;
            color: #92400E;
        }
        .status-approved {
            background: #D1FAE5;
            color: #065F46;
        }
        .status-rejected {
            background: #FEE2E2;
            color: #991B1B;
        }
        .leave-dates {
            font-size: 0.75rem;
            color: #6B7280;
            margin-top: 4px;
        }
        
        /* ========== HIGHLIGHTED APPLY SECTION ========== */
        .apply-section {
            background: linear-gradient(135deg, #EEF2FF 0%, #E0E7FF 100%);
            padding: 1.5rem;
            border-radius: 1.5rem;
            margin-bottom: 2rem;
            border: 2px solid #8b5cf6;
            box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .apply-section::before {
            content: "✨";
            position: absolute;
            top: -15px;
            right: -15px;
            font-size: 80px;
            opacity: 0.1;
            transform: rotate(15deg);
            pointer-events: none;
        }
        .apply-section:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 30px -10px rgba(139, 92, 246, 0.4);
            border-color: #6d28d9;
        }
        
        /* ========== HIGHLIGHTED "APPLY FOR LEAVE" TEXT ========== */
        .highlight-title {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .apply-text {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #4f46e5, #7c3aed, #c084fc, #4f46e5);
            background-size: 300% 300%;
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: inline-block;
            padding: 8px 24px;
            border-radius: 60px;
            letter-spacing: 1px;
            animation: gradientShift 3s ease infinite, textGlow 2s ease-in-out infinite;
            text-shadow: 0 2px 10px rgba(79, 70, 229, 0.3);
            position: relative;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes textGlow {
            0% { text-shadow: 0 0 5px rgba(79, 70, 229, 0.3); }
            50% { text-shadow: 0 0 20px rgba(139, 92, 246, 0.6); }
            100% { text-shadow: 0 0 5px rgba(79, 70, 229, 0.3); }
        }
        .apply-text::before {
            content: "📝";
            font-size: 1.8rem;
            margin-right: 12px;
            background: none;
            color: #4f46e5;
            -webkit-background-clip: unset;
            background-clip: unset;
        }
        .apply-text::after {
            content: "✨";
            font-size: 1.8rem;
            margin-left: 12px;
            background: none;
            color: #7c3aed;
            -webkit-background-clip: unset;
            background-clip: unset;
        }
        
        .section-subtitle {
            text-align: center;
            font-size: 0.85rem;
            color: #4f46e5;
            margin-top: -8px;
            margin-bottom: 20px;
            font-weight: 500;
        }
        
        .submit-btn {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            font-size: 1rem;
            padding: 14px;
            margin-top: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .submit-btn:hover {
            background: linear-gradient(135deg, #4338ca, #6d28d9);
        }
        
        .dashboard-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .dashboard-header h2 {
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .header-icon {
            font-size: 2rem;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        .history-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 1rem 0 0.8rem 0;
            font-size: 1.2rem;
            font-weight: 600;
            color: #1E293B;
            border-bottom: 2px solid #E2E8F0;
            padding-bottom: 8px;
        }
        
        .required-star {
            color: #EF4444;
        }
        
        .welcome-badge {
            color: #4f46e5;
            font-weight: 500;
            margin-bottom: 1.2rem;
            background: #EEF2FF;
            padding: 8px 16px;
            border-radius: 30px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="box" style="max-width: 600px;">
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 0.5rem;">
            <button onclick="goHome()" style="width: auto; background: #6B7280; margin: 0; padding: 8px 16px;">← Home</button>
            <div class="dashboard-header" style="flex: 1;">
                <span class="header-icon">📋</span>
                <h2>Leave Management</h2>
                <span style="font-size: 1.2rem;">🎯</span>
            </div>
        </div>
        
        <p class="welcome-badge" id="welcomeUser">
            👋 Welcome back!
        </p>

        
        <div class="apply-section">
            <div class="highlight-title">
                <span class="apply-text">Apply for Leave</span>
            </div>
            <div class="section-subtitle">
                ⭐ Fill out the form below to request your leave ⭐
            </div>
            
            <input type="text" id="studentName" placeholder="Full name *">
            
            <select id="leaveType">
                <option value="Sick Leave">🤒 Sick Leave</option>
                <option value="Casual Leave">🏖️ Casual Leave</option>
                <option value="Emergency Leave">🚨 Emergency Leave</option>
                <option value="Annual Leave">🌴 Annual Leave</option>
            </select>

            <div class="date-group">
                <div class="date-field">
                    <label>📅 Start Date <span class="required-star">*</span></label>
                    <input type="date" id="fromDate">
                </div>
                <div class="date-field">
                    <label>📅 End Date <span class="required-star">*</span></label>
                    <input type="date" id="toDate">
                </div>
            </div>
            <small id="dateError" class="error-msg"></small>

            <textarea id="leaveReason" placeholder="📝 Reason for leave (e.g., fever, family event, personal work...)"></textarea>

            <button onclick="submitLeave()" class="submit-btn">📨 Submit Leave Request →</button>
        </div>

        <div class="history-header">
            <span>📜</span> My Leave History
            <span>🕒</span>
        </div>
        <div id="userLeaveList" style="max-height: 350px; overflow-y: auto;"></div>
        
        <button onclick="logout()" class="logout-btn" style="margin-top: 1rem;">🚪 Logout</button>
    </div>
    
    <script src="script.js"></script>
    <script>
        function goHome() {
            window.location.href = "home.html";
        }

        function showMyLeaves() {
            let current = JSON.parse(localStorage.getItem("currentUser"));
            if(!current) return;
            let allLeaves = JSON.parse(localStorage.getItem("leaves")) || [];
            let myLeaves = allLeaves.filter(l => l.userEmail === current.email).reverse();
            let container = document.getElementById("userLeaveList");
            if(!container) return;
            container.innerHTML = "";
            if(myLeaves.length === 0) {
                container.innerHTML = "<div style='text-align:center; padding: 2rem; color: #6B7280; background:#F9FAFB; border-radius:1rem;'>📭 No leave requests yet.<br>✨ Apply for your first leave above!</div>";
                return;
            }
            myLeaves.forEach(l => {
                let div = document.createElement("div");
                div.className = "leave-card";
                
                let statusClass = "status-pending";
                if(l.status === "Approved") statusClass = "status-approved";
                if(l.status === "Rejected") statusClass = "status-rejected";
                
                let statusIcon = l.status === "Approved" ? "✅" : (l.status === "Rejected" ? "❌" : "⏳");
                
                div.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                        <strong>${l.type}</strong>
                        <span class="status-badge ${statusClass}">${statusIcon} ${l.status || "Pending"}</span>
                    </div>
                    <div class="leave-dates">
                        📅 Start: ${l.from} &nbsp;→&nbsp; End: ${l.to}
                    </div>
                    <div class="leave-reason">📝 ${l.reason || "No reason provided"}</div>
                `;
                container.appendChild(div);
            });
        }
        
        function validateDates(from, to) {
            if(!from || !to) return true;
            const fromDate = new Date(from);
            const toDate = new Date(to);
            if(fromDate > toDate) {
                document.getElementById("dateError").innerHTML = "❌ End Date cannot be earlier than Start Date!";
                return false;
            }
            document.getElementById("dateError").innerHTML = "";
            return true;
        }
        
        document.getElementById("fromDate")?.addEventListener("change", function() {
            let from = document.getElementById("fromDate").value;
            let to = document.getElementById("toDate").value;
            validateDates(from, to);
        });
        
        document.getElementById("toDate")?.addEventListener("change", function() {
            let from = document.getElementById("fromDate").value;
            let to = document.getElementById("toDate").value;
            validateDates(from, to);
        });
        
        window.submitLeave = function() {
            let current = JSON.parse(localStorage.getItem("currentUser"));
            if(!current){ 
                alert("Please login again"); 
                window.location.href="index.html"; 
                return; 
            }
            
            let name = document.getElementById("studentName").value.trim();
            let type = document.getElementById("leaveType").value;
            let from = document.getElementById("fromDate").value;
            let to = document.getElementById("toDate").value;
            let reason = document.getElementById("leaveReason").value.trim();
            
            if(!name){
                alert("❌ Please enter your full name!");
                return;
            }
            if(!from){
                alert("❌ Please select Start Date!");
                return;
            }
            if(!to){
                alert("❌ Please select End Date!");
                return;
            }
            
            if(!validateDates(from, to)) {
                alert("❌ Please fix the date range error! End Date must be after or equal to Start Date.");
                return;
            }
            
            if(!reason) {
                alert("⚠️ Please provide a reason for your leave request.");
                return;
            }
            
            let leaves = JSON.parse(localStorage.getItem("leaves")) || [];
            leaves.push({
                userName: name,
                userEmail: current.email,
                type: type,
                from: from,
                to: to,
                reason: reason,
                status: "Pending",
                timestamp: Date.now()
            });
            localStorage.setItem("leaves", JSON.stringify(leaves));
            
            alert("✅ Leave request submitted successfully!");
            
            document.getElementById("fromDate").value = "";
            document.getElementById("toDate").value = "";
            document.getElementById("leaveReason").value = "";
            document.getElementById("dateError").innerHTML = "";
            
            showMyLeaves();
        };
        
        window.onload = function() {
            let current = JSON.parse(localStorage.getItem("currentUser"));
            if(!current || current.role === "admin"){
                if(current && current.role === "admin") window.location.href = "admin.html";
                else window.location.href = "index.html";
                return;
            }
            let welcomeMsg = document.getElementById("welcomeUser");
            if(welcomeMsg) welcomeMsg.innerHTML = `👋 Welcome back, ${current.name} ✨`;
            if(document.getElementById("studentName")) document.getElementById("studentName").value = current.name;
            showMyLeaves();
        };
    </script>
</body>
</html>
