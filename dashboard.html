<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Dashboard | EduLeave</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='68' text-anchor='middle' font-size='50'%3E📋%3C/text%3E%3C/svg%3E">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            font-family: 'Inter', system-ui, sans-serif;
            padding: 1.5rem;
            min-height: 100vh;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
            width: 100%;
        }
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .btn-home {
            background: linear-gradient(135deg, #6c757d, #5a6268);
            border: none;
            border-radius: 2rem;
            padding: 0.6rem 1.2rem;
            font-weight: 600;
            font-size: 0.85rem;
            color: white;
            cursor: pointer;
            width: auto;
        }
        .btn-home:hover {
            transform: translateY(-2px);
        }
        h2 {
            color: #1a1a2e;
            font-size: 1.6rem;
            font-weight: 700;
        }
        .welcome-card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.2rem 1.8rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .welcome-text {
            color: #029f2e;
            font-weight: 600;
            font-size: 1.1rem;
        }
        .form-card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.8rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }
        .form-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        }
        .form-title {
            margin-bottom: 1.5rem;
            color: #1a1a2e;
            font-size: 1.3rem;
            font-weight: 600;
            border-bottom: 2px solid #029f2e;
            padding-bottom: 0.75rem;
            display: inline-block;
        }
        .input-field {
            width: 100%;
            padding: 0.85rem 1.2rem;
            border: 2px solid #e9ecef;
            border-radius: 1rem;
            font-size: 0.95rem;
            background: white;
            color: #1a1a2e;
            outline: none;
            margin-bottom: 1rem;
        }
        .input-field:focus {
            border-color: #029f2e;
            box-shadow: 0 0 0 3px rgba(2,159,46,0.1);
        }
        .date-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .date-field {
            flex: 1;
            min-width: 120px;
        }
        .date-field label {
            font-size: 0.75rem;
            color: #6c757d;
            margin-bottom: 0.4rem;
            display: block;
        }
        .btn-submit {
            background: linear-gradient(135deg, #029f2e, #028a27);
            border: none;
            border-radius: 1rem;
            padding: 0.9rem;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            width: 100%;
            margin-top: 0.5rem;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(2,159,46,0.3);
        }
        .btn-logout {
            background: linear-gradient(135deg, #dc3545, #c82333);
            border: none;
            border-radius: 1rem;
            padding: 0.9rem;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
        }
        .btn-logout:hover {
            transform: translateY(-2px);
        }
        .error-msg {
            color: #dc3545;
            font-size: 0.75rem;
            margin-bottom: 0.5rem;
        }
        @media (max-width: 480px) {
            body { padding: 1rem; }
            .form-card { padding: 1.2rem; }
            .date-group { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-section">
            <button class="btn-home" onclick="location.href='home.html'">← Home</button>
            <h2>📋 Leave Management</h2>
            <div style="width: 70px;"></div>
        </div>
        
        <div class="welcome-card">
            <div class="welcome-text" id="welcomeUser"></div>
        </div>
        
        <div class="form-card">
            <div class="form-title">Apply for Leave</div>
            
            <input type="text" id="studentName" placeholder="Full name" class="input-field">
            
            <select id="leaveType" class="input-field">
                <option>Sick Leave</option>
                <option>Casual Leave</option>
                <option>Emergency Leave</option>
                <option>Annual Leave</option>
            </select>
            
            <div class="date-group">
                <div class="date-field">
                    <label>📅 Start Date</label>
                    <input type="date" id="fromDate" class="input-field" style="margin-bottom: 0;">
                </div>
                <div class="date-field">
                    <label>📅 End Date</label>
                    <input type="date" id="toDate" class="input-field" style="margin-bottom: 0;">
                </div>
            </div>
            <div id="dateError" class="error-msg"></div>
            
            <textarea id="leaveReason" placeholder="Reason for leave..." class="input-field" style="min-height: 100px;"></textarea>
            
            <button class="btn-submit" onclick="submitLeave()">📨 Submit Leave Request</button>
        </div>
        
        <button class="btn-logout" onclick="logout()">🚪 Logout</button>
    </div>
    <script>
        function validateDates(from, to) {
            if(!from || !to) return true;
            if(new Date(from) > new Date(to)) {
                document.getElementById("dateError").innerHTML = "❌ End Date cannot be earlier than Start Date!";
                return false;
            }
            document.getElementById("dateError").innerHTML = "";
            return true;
        }
        
        document.getElementById("fromDate")?.addEventListener("change", function() {
            validateDates(document.getElementById("fromDate").value, document.getElementById("toDate").value);
        });
        document.getElementById("toDate")?.addEventListener("change", function() {
            validateDates(document.getElementById("fromDate").value, document.getElementById("toDate").value);
        });
        
        window.submitLeave = function() {
            let current = JSON.parse(localStorage.getItem("currentUser"));
            if(!current){ alert("Please login"); location.href="index.html"; return; }
            let name = document.getElementById("studentName").value.trim();
            let type = document.getElementById("leaveType").value;
            let from = document.getElementById("fromDate").value;
            let to = document.getElementById("toDate").value;
            let reason = document.getElementById("leaveReason").value.trim();
            if(!name || !from || !to || !reason) { alert("Please fill all fields!"); return; }
            if(!validateDates(from, to)) { alert("Please fix date range!"); return; }
            
            let leaves = JSON.parse(localStorage.getItem("leaves")) || [];
            leaves.push({ userName: name, userEmail: current.email, type, from, to, reason, status: "Pending", timestamp: Date.now() });
            localStorage.setItem("leaves", JSON.stringify(leaves));
            
            let notifications = JSON.parse(localStorage.getItem("notifications")) || [];
            notifications.push({ id: Date.now(), type: "leave", userName: name, userEmail: current.email, details: `${type} | ${from} → ${to}`, reason: reason, status: "pending", read: false, timestamp: Date.now() });
            localStorage.setItem("notifications", JSON.stringify(notifications));
            
            alert("✅ Leave request submitted!");
            document.getElementById("fromDate").value = "";
            document.getElementById("toDate").value = "";
            document.getElementById("leaveReason").value = "";
        };
        
        window.onload = function() {
            let current = JSON.parse(localStorage.getItem("currentUser"));
            if(!current || current.role === "admin") { if(current?.role === "admin") location.href="admin.html"; else location.href="index.html"; return; }
            document.getElementById("welcomeUser").innerHTML = `👋 Welcome, ${current.name}`;
            document.getElementById("studentName").value = current.name;
        };
    </script>
</body>
</html>
