<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Dashboard | EduLeave</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='68' text-anchor='middle' font-size='50'%3E📋%3C/text%3E%3C/svg%3E">
</head>
<body>
    <div class="container" style="max-width: 650px;">
        <div class="flex-between flex-wrap gap-2 mb-2">
            <button onclick="location.href='home.html'" class="btn-secondary" style="width: auto; padding: 0.5rem 1rem;">← Home</button>
            <h2 style="margin: 0;">📋 Leave Management</h2>
        </div>
        
        <p id="welcomeUser" class="text-green mb-2"></p>
        
        <!-- Leave Application Form -->
        <div class="card mb-3">
            <h3>✍️ Apply for Leave</h3>
            <input type="text" id="studentName" placeholder="Full name" class="mb-2">
            
            <select id="leaveType" class="mb-2">
                <option>Sick Leave</option>
                <option>Casual Leave</option>
                <option>Emergency Leave</option>
                <option>Annual Leave</option>
            </select>
            
            <div class="date-group">
                <div class="date-field">
                    <label>📅 Start Date</label>
                    <input type="date" id="fromDate">
                </div>
                <div class="date-field">
                    <label>📅 End Date</label>
                    <input type="date" id="toDate">
                </div>
            </div>
            <div id="dateError" class="error-msg"></div>
            
            <textarea id="leaveReason" placeholder="Reason for leave..."></textarea>
            
            <button onclick="submitLeave()">📨 Submit Leave Request</button>
        </div>
        
        <h3>📌 My Leave History</h3>
        <div id="userLeaveList"></div>
        
        <button onclick="logout()" class="btn-danger mt-3">🚪 Logout</button>
    </div>
    <script src="script.js"></script>
    <script>
        function showMyLeaves() {
            let current = JSON.parse(localStorage.getItem("currentUser"));
            if(!current) return;
            let allLeaves = JSON.parse(localStorage.getItem("leaves")) || [];
            let myLeaves = allLeaves.filter(l => l.userEmail === current.email).reverse();
            let container = document.getElementById("userLeaveList");
            if(!container) return;
            container.innerHTML = myLeaves.length === 0 ? "<div class='empty-state'>📭 No leave requests yet.</div>" : "";
            myLeaves.forEach(l => {
                let statusClass = l.status === "Approved" ? "status-approved" : (l.status === "Rejected" ? "status-rejected" : "status-pending");
                let adminHtml = l.adminComment ? `<div class="admin-comment">💬 Admin (${l.adminName || 'Admin'}): ${l.adminComment}</div>` : "";
                container.innerHTML += `
                    <div class="leave-card">
                        <div class="flex-between flex-wrap">
                            <strong>${l.type}</strong>
                            <span class="status-badge ${statusClass}">${l.status || "Pending"}</span>
                        </div>
                        <div class="text-gray" style="font-size:0.75rem;">📅 ${l.from} → ${l.to}</div>
                        <div class="mt-1">📝 ${l.reason || "No reason"}</div>
                        ${adminHtml}
                    </div>
                `;
            });
        }
        
        function validateDates(from, to) {
            if(!from || !to) return true;
            if(new Date(from) > new Date(to)) {
                document.getElementById("dateError").innerHTML = "❌ End Date cannot be earlier than Start Date!";
                return false;
            }
            document.getElementById("dateError").innerHTML = "";
            return true;
        }
        
        document.getElementById("fromDate")?.addEventListener("change", function() {
            validateDates(document.getElementById("fromDate").value, document.getElementById("toDate").value);
        });
        document.getElementById("toDate")?.addEventListener("change", function() {
            validateDates(document.getElementById("fromDate").value, document.getElementById("toDate").value);
        });
        
        window.submitLeave = function() {
            let current = JSON.parse(localStorage.getItem("currentUser"));
            if(!current){ alert("Please login"); location.href="index.html"; return; }
            let name = document.getElementById("studentName").value.trim();
            let type = document.getElementById("leaveType").value;
            let from = document.getElementById("fromDate").value;
            let to = document.getElementById("toDate").value;
            let reason = document.getElementById("leaveReason").value.trim();
            if(!name || !from || !to || !reason) { alert("Please fill all fields!"); return; }
            if(!validateDates(from, to)) { alert("Please fix date range!"); return; }
            
            let leaves = JSON.parse(localStorage.getItem("leaves")) || [];
            leaves.push({ userName: name, userEmail: current.email, type, from, to, reason, status: "Pending", timestamp: Date.now() });
            localStorage.setItem("leaves", JSON.stringify(leaves));
            
            let notifications = JSON.parse(localStorage.getItem("notifications")) || [];
            notifications.push({ id: Date.now(), type: "leave", userName: name, userEmail: current.email, details: `${type} | ${from} → ${to}`, reason: reason, status: "pending", read: false, timestamp: Date.now() });
            localStorage.setItem("notifications", JSON.stringify(notifications));
            
            alert("✅ Leave request submitted!");
            document.getElementById("fromDate").value = "";
            document.getElementById("toDate").value = "";
            document.getElementById("leaveReason").value = "";
            showMyLeaves();
        };
        
        window.onload = function() {
            let current = JSON.parse(localStorage.getItem("currentUser"));
            if(!current || current.role === "admin") { if(current?.role === "admin") location.href="admin.html"; else location.href="index.html"; return; }
            document.getElementById("welcomeUser").innerHTML = `👋 Welcome, ${current.name}`;
            document.getElementById("studentName").value = current.name;
            showMyLeaves();
        };
    </script>
</body>
</html>
