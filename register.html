<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | EduLeave</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .suggestions-box {
            background: white;
            border-radius: 1rem;
            border: 1px solid #E2E8F0;
            margin-top: -5px;
            margin-bottom: 8px;
            max-height: 140px;
            overflow-y: auto;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            position: relative;
            z-index: 10;
        }
        .suggestion-item {
            padding: 8px 14px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.1s;
            border-bottom: 1px solid #F1F5F9;
            color: #1E293B;
        }
        .suggestion-item:hover {
            background: #EFF6FF;
            font-weight: 500;
        }
        .password-strength {
            font-size: 0.7rem;
            margin-top: 5px;
            margin-bottom: 8px;
            padding: 6px 10px;
            border-radius: 30px;
            background: #F1F5F9;
            transition: all 0.2s;
        }
        .strength-weak { background: #FEE2E2; color: #991B1B; }
        .strength-medium { background: #FEF3C7; color: #92400E; }
        .strength-strong { background: #D1FAE5; color: #065F46; }
        .req-list {
            font-size: 0.7rem;
            margin: 5px 0 0 0;
            padding-left: 20px;
            color: #4B5563;
            list-style: none;
        }
        .req-list li {
            margin: 3px 0;
            background: none;
            padding: 0;
            border-left: none;
            font-size: 0.7rem;
        }
        
        
        .form-icon {
            text-align: center;
            margin-bottom: 1rem;
        }
        .icon-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.3);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.3); }
            50% { transform: scale(1.05); box-shadow: 0 15px 35px -5px rgba(79, 70, 229, 0.5); }
            100% { transform: scale(1); box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.3); }
        }
    </style>
</head>
<body>
    <div class="box">
        <!-- CSS Icon instead of image -->
        <div class="form-icon">
            <div class="icon-circle">📝</div>
        </div>
        <h2>Create Account</h2>
        <p style="margin-bottom: 1rem; color: #4B5563; text-align: center;">Join the leave management system</p>

        <input type="text" id="name" placeholder="Full name">
        
        <input type="email" id="email" placeholder="Email address" autocomplete="off">
        <div id="emailSuggestions" class="suggestions-box" style="display: none;"></div>
        <small id="emailMsg" class="msg-helper"></small>

        <input type="password" id="password" placeholder="Create password">
        <div id="passwordStrength" class="password-strength">🔒 Password strength: </div>
        <ul class="req-list" id="passwordReqs">
            <li id="reqUpper">🔤 At least 1 uppercase letter (A-Z)</li>
            <li id="reqLower">🔡 At least 1 lowercase letter (a-z)</li>
            <li id="reqDigit">🔢 At least 1 digit (0-9)</li>
            <li id="reqSpecial">✨ At least 1 special character (@$!%*?&)</li>
            <li id="reqLength">📏 Minimum 8 characters long</li>
        </ul>

        <select id="role">
            <option value="">Select role</option>
            <option value="user">👤 User (Student/Employee)</option>
            <option value="admin">👑 Administrator</option>
        </select>

        <button onclick="register()">Create Account →</button>

        <p style="text-align: center; margin-top: 1.5rem;">Already have account? <a href="index.html">Sign in</a></p>
    </div>
    <script src="script.js"></script>
    <script>
        // Email suggestion feature
        const commonDomains = ["gmail.com", "yahoo.com", "outlook.com", "hotmail.com", "icloud.com", "protonmail.com", "edu.bd", "university.edu", "office.com"];
        const emailField = document.getElementById("email");
        const suggBox = document.getElementById("emailSuggestions");

        emailField?.addEventListener("input", function() {
            let value = emailField.value;
            let atIndex = value.indexOf('@');
            let suggestions = [];

            if (atIndex === -1 && value.length > 1) {
                let local = value;
                suggestions = commonDomains.map(dom => `${local}@${dom}`);
            } 
            else if (atIndex > 0) {
                let local = value.substring(0, atIndex);
                let domainPart = value.substring(atIndex + 1);
                if (domainPart === "") {
                    suggestions = commonDomains.map(dom => `${local}@${dom}`);
                } else {
                    suggestions = commonDomains.filter(dom => dom.toLowerCase().startsWith(domainPart.toLowerCase()))
                                               .map(dom => `${local}@${dom}`);
                }
            }
            suggestions = suggestions.slice(0, 5);
            if (suggestions.length === 0) {
                suggBox.style.display = "none";
                return;
            }
            suggBox.style.display = "block";
            suggBox.innerHTML = "";
            suggestions.forEach(sug => {
                let div = document.createElement("div");
                div.className = "suggestion-item";
                div.textContent = sug;
                div.onclick = () => {
                    emailField.value = sug;
                    suggBox.style.display = "none";
                    emailField.dispatchEvent(new Event("input"));
                };
                suggBox.appendChild(div);
            });
        });
        document.addEventListener("click", (e) => {
            if (!suggBox.contains(e.target) && e.target !== emailField) suggBox.style.display = "none";
        });

        // Password validation with real-time strength
        const passwordInput = document.getElementById("password");
        const strengthDiv = document.getElementById("passwordStrength");
        
        function checkPasswordStrength(pwd) {
            const hasUpper = /[A-Z]/.test(pwd);
            const hasLower = /[a-z]/.test(pwd);
            const hasDigit = /[0-9]/.test(pwd);
            const hasSpecial = /[@$!%*?&#]/.test(pwd);
            const isLong = pwd.length >= 8;
            
            document.getElementById("reqUpper").style.color = hasUpper ? "#10B981" : "#EF4444";
            document.getElementById("reqLower").style.color = hasLower ? "#10B981" : "#EF4444";
            document.getElementById("reqDigit").style.color = hasDigit ? "#10B981" : "#EF4444";
            document.getElementById("reqSpecial").style.color = hasSpecial ? "#10B981" : "#EF4444";
            document.getElementById("reqLength").style.color = isLong ? "#10B981" : "#EF4444";
            
            if(hasUpper && hasLower && hasDigit && hasSpecial && isLong) {
                strengthDiv.innerHTML = "✅ Strong Password! Great job!";
                strengthDiv.className = "password-strength strength-strong";
                return "strong";
            } else if((hasUpper || hasLower) && (hasDigit || hasSpecial) && pwd.length >= 6) {
                strengthDiv.innerHTML = "⚠️ Medium Password - Add more variety";
                strengthDiv.className = "password-strength strength-medium";
                return "medium";
            } else {
                strengthDiv.innerHTML = "❌ Weak Password - Follow requirements above";
                strengthDiv.className = "password-strength strength-weak";
                return "weak";
            }
        }
        
        passwordInput?.addEventListener("input", function() {
            checkPasswordStrength(passwordInput.value);
        });
        
        // Override register function to validate password strength
        const originalRegister = window.register;
        window.register = function() {
            let pwd = document.getElementById("password")?.value;
            const hasUpper = /[A-Z]/.test(pwd);
            const hasLower = /[a-z]/.test(pwd);
            const hasDigit = /[0-9]/.test(pwd);
            const hasSpecial = /[@$!%*?&#]/.test(pwd);
            const isLong = pwd.length >= 8;
            
            if(!hasUpper || !hasLower || !hasDigit || !hasSpecial || !isLong) {
                alert("❌ Password must contain: Uppercase, Lowercase, Digit, Special character (@$!%*?&#) and min 8 characters!");
                return;
            }
            originalRegister();
        };
    </script>
</body>
</html>
