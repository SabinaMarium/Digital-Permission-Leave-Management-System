<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Register | EduLeave</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='68' text-anchor='middle' font-size='50'%3E📝%3C/text%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }
        .register-container { max-width: 500px; width: 100%; margin: 0 auto; }
        .box {
            background: #1e1e1e;
            border-radius: 2rem;
            padding: 2rem 1.8rem;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s ease;
        }
        h2 { font-size: 1.8rem; font-weight: 700; text-align: center; color: #ffffff; margin-bottom: 0.5rem; }
        .subtitle { text-align: center; color: #ffffff; margin-bottom: 1.5rem; font-size: 0.9rem; }
        .input-group { position: relative; margin: 8px 0; }
        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #333;
            border-radius: 40px;
            font-size: 1rem;
            background: #2a2a2a;
            color: #ffffff;
            outline: none;
        }
        .input-group input { padding-right: 50px; }
        input::placeholder, select { color: #bbbbbb; }
        input:focus, select:focus { border-color: #048428; }
        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #9ca3af;
            font-size: 1.2rem;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 18px;
            background: #029f2e;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            cursor: pointer;
        }
        button:hover { background: #049d2f; transform: scale(0.98); }
        .footer-text { text-align: center; margin-top: 1.5rem; color: #ffffff; font-size: 0.85rem; }
        .footer-text a { color: #4ade80; text-decoration: none; font-weight: 600; }
        .suggestions-box {
            background: #2a2a2a;
            border-radius: 1rem;
            border: 1px solid #333;
            margin-top: -5px;
            margin-bottom: 8px;
            max-height: 140px;
            overflow-y: auto;
        }
        .suggestion-item { padding: 8px 16px; cursor: pointer; border-bottom: 1px solid #333; color: #ffffff; }
        .suggestion-item:hover { background: #3a3a3a; }
        .password-strength { font-size: 0.7rem; margin-top: 5px; padding: 6px 12px; border-radius: 40px; background: #2a2a2a; color: #ffffff; }
        .strength-weak { background: #7f1a1a; color: #fca5a5; }
        .strength-medium { background: #78350f; color: #fde68a; }
        .strength-strong { background: #064e3b; color: #6ee7b7; }
        .req-list { font-size: 0.75rem; margin: 10px 0 0 0; padding-left: 20px; color: #ffffff; list-style: none; }
        .req-list li { margin: 4px 0; }
        .error-msg { color: #f87171; font-size: 0.75rem; margin-top: 4px; }
        .success-msg { color: #4ade80; font-size: 0.75rem; margin-top: 4px; }
        .mb-2 { margin-bottom: 1rem; }
        .mt-2 { margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="box">
            <h2>Create Account</h2>
            <p class="subtitle">Join the leave management system</p>
            
            <input type="text" id="name" placeholder="Full name" class="mb-2">
            <input type="email" id="email" placeholder="Email address" class="mb-2">
            <div id="emailSuggestions" class="suggestions-box" style="display: none;"></div>
            
            <div class="input-group">
                <input type="password" id="password" placeholder="Create password">
                <i class="fas fa-eye password-toggle" onclick="togglePassword('password', this)"></i>
            </div>
            <div id="passwordStrength" class="password-strength"><i class="fas fa-shield-alt"></i> Password strength:</div>
            <ul class="req-list mb-2">
                <li id="reqUpper"><i class="fas fa-arrow-up"></i> Uppercase (A-Z)</li>
                <li id="reqLower"><i class="fas fa-arrow-down"></i> Lowercase (a-z)</li>
                <li id="reqDigit"><i class="fas fa-hashtag"></i> Digit (0-9)</li>
                <li id="reqSpecial"><i class="fas fa-star"></i> Special (@$!%*?&)</li>
                <li id="reqLength"><i class="fas fa-ruler"></i> Minimum 8 characters</li>
            </ul>
            
            <div class="input-group">
                <input type="password" id="confirmPassword" placeholder="Confirm password">
                <i class="fas fa-eye password-toggle" onclick="togglePassword('confirmPassword', this)"></i>
            </div>
            <div id="confirmError" class="error-msg"></div>
            <div id="confirmSuccess" class="success-msg"></div>
            
            <select id="role" class="mb-2">
                <option value="">Select role</option>
                <option value="user"><i class="fas fa-user"></i> User</option>
                <option value="admin"><i class="fas fa-crown"></i> Administrator</option>
            </select>
            
            <div id="registerError" class="error-msg"></div>
            <div id="registerSuccess" class="success-msg"></div>
            
            <button onclick="register()" class="mt-2">Create Account <i class="fas fa-user-plus"></i></button>
            
            <p class="footer-text">Already have account? <a href="index.html">Sign in</a></p>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        function togglePassword(fieldId, btn) {
            const field = document.getElementById(fieldId);
            if (field.type === 'password') {
                field.type = 'text';
                btn.classList.remove('fa-eye');
                btn.classList.add('fa-eye-slash');
            } else {
                field.type = 'password';
                btn.classList.remove('fa-eye-slash');
                btn.classList.add('fa-eye');
            }
        }
        
        const commonDomains = ["gmail.com", "yahoo.com", "outlook.com", "hotmail.com", "icloud.com", "protonmail.com"];
        const emailField = document.getElementById("email");
        const suggBox = document.getElementById("emailSuggestions");

        emailField?.addEventListener("input", function() {
            let value = emailField.value;
            let atIndex = value.indexOf('@');
            let suggestions = [];
            if (atIndex === -1 && value.length > 1) {
                suggestions = commonDomains.map(dom => `${value}@${dom}`);
            } 
            else if (atIndex > 0) {
                let local = value.substring(0, atIndex);
                let domainPart = value.substring(atIndex + 1);
                if (domainPart === "") suggestions = commonDomains.map(dom => `${local}@${dom}`);
                else suggestions = commonDomains.filter(dom => dom.toLowerCase().startsWith(domainPart.toLowerCase())).map(dom => `${local}@${dom}`);
            }
            suggestions = suggestions.slice(0, 5);
            if (!suggestions.length) { suggBox.style.display = "none"; return; }
            suggBox.style.display = "block";
            suggBox.innerHTML = suggestions.map(sug => `<div class="suggestion-item" onclick="document.getElementById('email').value='${sug}'; suggBox.style.display='none';">${sug}</div>`).join('');
        });
        
        document.addEventListener("click", (e) => {
            if (!suggBox.contains(e.target) && e.target !== emailField) suggBox.style.display = "none";
        });

        const passwordInput = document.getElementById("password");
        const confirmInput = document.getElementById("confirmPassword");
        
        function checkPasswordStrength(pwd) {
            const hasUpper = /[A-Z]/.test(pwd);
            const hasLower = /[a-z]/.test(pwd);
            const hasDigit = /[0-9]/.test(pwd);
            const hasSpecial = /[@$!%*?&#]/.test(pwd);
            const isLong = pwd.length >= 8;
            
            document.getElementById("reqUpper").style.color = hasUpper ? "#4ade80" : "#f87171";
            document.getElementById("reqLower").style.color = hasLower ? "#4ade80" : "#f87171";
            document.getElementById("reqDigit").style.color = hasDigit ? "#4ade80" : "#f87171";
            document.getElementById("reqSpecial").style.color = hasSpecial ? "#4ade80" : "#f87171";
            document.getElementById("reqLength").style.color = isLong ? "#4ade80" : "#f87171";
            
            let div = document.getElementById("passwordStrength");
            if(hasUpper && hasLower && hasDigit && hasSpecial && isLong) {
                div.innerHTML = '<i class="fas fa-check-circle"></i> Strong Password! Great job!';
                div.className = "password-strength strength-strong";
            } else if((hasUpper || hasLower) && (hasDigit || hasSpecial) && pwd.length >= 6) {
                div.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Medium Password - Add more variety';
                div.className = "password-strength strength-medium";
            } else {
                div.innerHTML = '<i class="fas fa-times-circle"></i> Weak Password - Follow requirements above';
                div.className = "password-strength strength-weak";
            }
        }
        
        function validateConfirmPassword() {
            const password = passwordInput.value;
            const confirm = confirmInput.value;
            const confirmError = document.getElementById("confirmError");
            const confirmSuccess = document.getElementById("confirmSuccess");
            
            if(confirm === "") {
                confirmError.innerHTML = "";
                confirmSuccess.innerHTML = "";
                return;
            }
            if(password !== confirm) {
                confirmError.innerHTML = '<i class="fas fa-times-circle"></i> Passwords do not match!';
                confirmSuccess.innerHTML = "";
                return false;
            } else {
                confirmError.innerHTML = "";
                confirmSuccess.innerHTML = '<i class="fas fa-check-circle"></i> Passwords match!';
                return true;
            }
        }
        
        passwordInput?.addEventListener("input", function() {
            checkPasswordStrength(passwordInput.value);
            validateConfirmPassword();
        });
        confirmInput?.addEventListener("input", validateConfirmPassword);
    </script>
</body>
</html>
