<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Register | EduLeave</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='68' text-anchor='middle' font-size='50'%3E📝%3C/text%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }
        .register-container { max-width: 550px; width: 100%; margin: 0 auto; }
        .box {
            background: #1e1e1e;
            border-radius: 2rem;
            padding: 2rem;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s ease;
        }
        .box:hover { transform: translateY(-3px); }
        h2 { font-size: 1.8rem; font-weight: 700; text-align: center; color: #ffffff; margin-bottom: 0.5rem; }
        .subtitle { text-align: center; color: #a1a1aa; margin-bottom: 1.5rem; font-size: 0.9rem; }
        .input-group { position: relative; margin: 8px 0; }
        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #333;
            border-radius: 40px;
            font-size: 1rem;
            background: #2a2a2a;
            color: #ffffff;
            outline: none;
            margin-bottom: 12px;
        }
        .input-group input { padding-right: 50px; }
        input::placeholder, select { color: #bbbbbb; }
        input:focus, select:focus { border-color: #2da44e; box-shadow: 0 0 0 2px rgba(45, 164, 78, 0.1); }
        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #9ca3af;
            font-size: 1.2rem;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 18px;
            background: #2da44e;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            cursor: pointer;
        }
        button:hover { background: #2c974b; transform: scale(0.98); }
        .footer-text { text-align: center; margin-top: 1.5rem; color: #6b7280; font-size: 0.85rem; }
        .footer-text a { color: #2da44e; text-decoration: none; font-weight: 600; }
        .suggestions-box {
            background: #2a2a2a;
            border-radius: 1rem;
            border: 1px solid #333;
            margin-top: -10px;
            margin-bottom: 8px;
            max-height: 140px;
            overflow-y: auto;
        }
        .suggestion-item { padding: 8px 16px; cursor: pointer; border-bottom: 1px solid #333; color: #ffffff; }
        .suggestion-item:hover { background: #3a3a3a; }
        .password-strength { font-size: 0.7rem; margin-top: 5px; padding: 6px 12px; border-radius: 40px; background: #2a2a2a; color: #ffffff; }
        .strength-weak { background: #7f1a1a; color: #fca5a5; }
        .strength-medium { background: #78350f; color: #fde68a; }
        .strength-strong { background: #064e3b; color: #6ee7b7; }
        .req-list { font-size: 0.75rem; margin: 10px 0 0 0; padding-left: 20px; color: #a1a1aa; list-style: none; }
        .req-list li { margin: 4px 0; }
        .error-msg { color: #f87171; font-size: 0.75rem; margin-top: 4px; }
        .success-msg { color: #4ade80; font-size: 0.75rem; margin-top: 4px; }
        .form-row { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
        .form-row .half { flex: 1; min-width: 120px; }
        .mb-2 { margin-bottom: 1rem; }
        .mt-2 { margin-top: 1rem; }
        .hidden { display: none; }
        .verification-notice {
            background: #064e3b;
            color: #6ee7b7;
            padding: 12px;
            border-radius: 12px;
            margin: 15px 0;
            text-align: center;
            font-size: 13px;
            border: 1px solid #059669;
        }
        @media (max-width: 550px) {
            .box { padding: 1.5rem; }
            .form-row { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="box">
            <h2>Create Account</h2>
            <p class="subtitle">Join the leave management system</p>
            
            <div id="registerError" class="error-msg"></div>
            <div id="registerSuccess" class="success-msg"></div>
            <div id="verificationNotice" class="verification-notice" style="display: none;"></div>
            
            <input type="text" id="name" placeholder="Full name">
            <input type="email" id="email" placeholder="Email address">
            <div id="emailSuggestions" class="suggestions-box" style="display: none;"></div>
            
            <select id="role">
                <option value="">Select role</option>
                <option value="user">User (Student/Employee)</option>
                <option value="admin">Administrator</option>
            </select>
            
            <div id="userFields">
                <select id="userDepartment">
                    <option value="">Select Department</option>
                    <option value="CSE">CSE</option>
                    <option value="EEE">EEE</option>
                    <option value="BBA">BBA</option>
                    <option value="LLB">LLB</option>
                    <option value="CEN">CEN</option>
                    <option value="TEX">TEX</option>
                </select>
                <div class="form-row">
                    <div class="half"><input type="number" id="batch" placeholder="Batch (e.g., 2024)"></div>
                    <div class="half"><input type="text" id="studentId" placeholder="ID (e.g., CSE 031 08187)"></div>
                </div>
            </div>
            
            <div id="adminFields" class="hidden">
                <select id="adminDepartment">
                    <option value="">Select Department</option>
                    <option value="CSE">CSE</option>
                    <option value="EEE">EEE</option>
                    <option value="BBA">BBA</option>
                    <option value="LLB">LLB</option>
                    <option value="CEN">CEN</option>
                    <option value="TEX">TEX</option>
                </select>
            </div>
            
            <div class="input-group">
                <input type="password" id="password" placeholder="Create password">
                <i class="fas fa-eye password-toggle" onclick="togglePassword('password', this)"></i>
            </div>
            <div id="passwordStrength" class="password-strength">Password strength:</div>
            <ul class="req-list">
                <li id="reqUpper">✓ Uppercase (A-Z)</li>
                <li id="reqLower">✓ Lowercase (a-z)</li>
                <li id="reqDigit">✓ Digit (0-9)</li>
                <li id="reqSpecial">✓ Special (@$!%*?&)</li>
                <li id="reqLength">✓ Minimum 8 characters</li>
            </ul>
            
            <div class="input-group">
                <input type="password" id="confirmPassword" placeholder="Confirm password">
                <i class="fas fa-eye password-toggle" onclick="togglePassword('confirmPassword', this)"></i>
            </div>
            <div id="confirmError" class="error-msg"></div>
            <div id="confirmSuccess" class="success-msg"></div>
            
            <button onclick="register()">Create Account</button>
            
            <p class="footer-text">Already have account? <a href="index.html">Sign in</a></p>
        </div>
    </div>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBtQx8RJ3QbAAxZOwthz4YqWeq-DOC5rGg",
            authDomain: "eduleave-system.firebaseapp.com",
            projectId: "eduleave-system",
            storageBucket: "eduleave-system.firebasestorage.app",
            messagingSenderId: "311349906309",
            appId: "1:311349906309:web:bf5391e233cd186943d2ec"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        
        // ========== TOGGLE PASSWORD ==========
        function togglePassword(fieldId, btn) {
            const field = document.getElementById(fieldId);
            if (field.type === 'password') {
                field.type = 'text';
                btn.classList.remove('fa-eye');
                btn.classList.add('fa-eye-slash');
            } else {
                field.type = 'password';
                btn.classList.remove('fa-eye-slash');
                btn.classList.add('fa-eye');
            }
        }
        
        // ========== ROLE BASED FIELDS ==========
        const roleSelect = document.getElementById("role");
        const userFields = document.getElementById("userFields");
        const adminFields = document.getElementById("adminFields");
        
        roleSelect.addEventListener("change", function() {
            if (this.value === "user") {
                userFields.classList.remove("hidden");
                adminFields.classList.add("hidden");
            } else if (this.value === "admin") {
                userFields.classList.add("hidden");
                adminFields.classList.remove("hidden");
            } else {
                userFields.classList.add("hidden");
                adminFields.classList.add("hidden");
            }
        });
        
        // ========== EMAIL SUGGESTION ==========
        const commonDomains = ["gmail.com", "yahoo.com", "outlook.com", "hotmail.com", "icloud.com", "protonmail.com", "edu.bd", "university.edu", "office.com"];
        const emailField = document.getElementById("email");
        const suggBox = document.getElementById("emailSuggestions");

        emailField?.addEventListener("input", function() {
            let value = emailField.value;
            let atIndex = value.indexOf('@');
            let suggestions = [];
            if (atIndex === -1 && value.length > 1) {
                suggestions = commonDomains.map(dom => `${value}@${dom}`);
            } 
            else if (atIndex > 0) {
                let local = value.substring(0, atIndex);
                let domainPart = value.substring(atIndex + 1);
                if (domainPart === "") suggestions = commonDomains.map(dom => `${local}@${dom}`);
                else suggestions = commonDomains.filter(dom => dom.toLowerCase().startsWith(domainPart.toLowerCase())).map(dom => `${local}@${dom}`);
            }
            suggestions = suggestions.slice(0, 5);
            if (!suggestions.length) { suggBox.style.display = "none"; return; }
            suggBox.style.display = "block";
            suggBox.innerHTML = suggestions.map(sug => `<div class="suggestion-item" onclick="document.getElementById('email').value='${sug}'; suggBox.style.display='none';">${sug}</div>`).join('');
        });
        
        document.addEventListener("click", (e) => {
            if (!suggBox.contains(e.target) && e.target !== emailField) suggBox.style.display = "none";
        });
        
        // ========== PASSWORD STRENGTH ==========
        const passwordInput = document.getElementById("password");
        const confirmInput = document.getElementById("confirmPassword");
        
        function checkPasswordStrength(pwd) {
            const hasUpper = /[A-Z]/.test(pwd);
            const hasLower = /[a-z]/.test(pwd);
            const hasDigit = /[0-9]/.test(pwd);
            const hasSpecial = /[@$!%*?&#]/.test(pwd);
            const isLong = pwd.length >= 8;
            
            document.getElementById("reqUpper").style.color = hasUpper ? "#4ade80" : "#f87171";
            document.getElementById("reqLower").style.color = hasLower ? "#4ade80" : "#f87171";
            document.getElementById("reqDigit").style.color = hasDigit ? "#4ade80" : "#f87171";
            document.getElementById("reqSpecial").style.color = hasSpecial ? "#4ade80" : "#f87171";
            document.getElementById("reqLength").style.color = isLong ? "#4ade80" : "#f87171";
            
            let div = document.getElementById("passwordStrength");
            if(hasUpper && hasLower && hasDigit && hasSpecial && isLong) {
                div.innerHTML = '✅ Strong Password! Great job!';
                div.className = "password-strength strength-strong";
            } else if((hasUpper || hasLower) && (hasDigit || hasSpecial) && pwd.length >= 6) {
                div.innerHTML = '⚠️ Medium Password - Add more variety';
                div.className = "password-strength strength-medium";
            } else {
                div.innerHTML = '❌ Weak Password - Follow requirements above';
                div.className = "password-strength strength-weak";
            }
        }
        
        function validateConfirmPassword() {
            const password = passwordInput.value;
            const confirm = confirmInput.value;
            const confirmError = document.getElementById("confirmError");
            const confirmSuccess = document.getElementById("confirmSuccess");
            
            if(confirm === "") {
                confirmError.innerHTML = "";
                confirmSuccess.innerHTML = "";
                return;
            }
            if(password !== confirm) {
                confirmError.innerHTML = '✗ Passwords do not match!';
                confirmSuccess.innerHTML = "";
                return false;
            } else {
                confirmError.innerHTML = "";
                confirmSuccess.innerHTML = '✓ Passwords match!';
                return true;
            }
        }
        
        passwordInput?.addEventListener("input", function() {
            checkPasswordStrength(passwordInput.value);
            validateConfirmPassword();
        });
        confirmInput?.addEventListener("input", validateConfirmPassword);
        
        // ========== REGISTER FUNCTION WITH EMAIL VERIFICATION ==========
        window.register = async function() {
            let name = document.getElementById("name").value.trim();
            let email = document.getElementById("email").value.trim();
            let role = document.getElementById("role").value;
            let pass = document.getElementById("password").value;
            let confirmPwd = document.getElementById("confirmPassword").value;
            let errorDiv = document.getElementById("registerError");
            let successDiv = document.getElementById("registerSuccess");
            let verificationDiv = document.getElementById("verificationNotice");
            
            errorDiv.innerHTML = "";
            successDiv.innerHTML = "";
            verificationDiv.style.display = "none";
            
            if (!name || !email || !role || !pass || !confirmPwd) {
                errorDiv.innerHTML = "Please fill all required fields!";
                return;
            }
            
            let department = "", batch = "", studentId = "";
            if (role === "user") {
                department = document.getElementById("userDepartment").value;
                batch = document.getElementById("batch").value;
                studentId = document.getElementById("studentId").value.trim();
                if (!department || !batch || !studentId) {
                    errorDiv.innerHTML = "Please fill Department, Batch and ID!";
                    return;
                }
            } else if (role === "admin") {
                department = document.getElementById("adminDepartment").value;
                if (!department) {
                    errorDiv.innerHTML = "Please select Department!";
                    return;
                }
            }
            
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email)) {
                errorDiv.innerHTML = "Enter a valid email address!";
                return;
            }
            
            if (pass !== confirmPwd) {
                errorDiv.innerHTML = "Passwords do not match!";
                return;
            }
            
            const hasUpper = /[A-Z]/.test(pass);
            const hasLower = /[a-z]/.test(pass);
            const hasDigit = /[0-9]/.test(pass);
            const hasSpecial = /[@$!%*?&#]/.test(pass);
            const isLong = pass.length >= 8;
            
            if (!hasUpper || !hasLower || !hasDigit || !hasSpecial || !isLong) {
                errorDiv.innerHTML = "Password must contain: Uppercase, Lowercase, Digit, Special character @$!%*?&# and min 8 chars!";
                return;
            }
            
            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, pass);
                const user = userCredential.user;
                
                // Send email verification
                await user.sendEmailVerification({
                    url: window.location.origin + "/index.html",
                    handleCodeInApp: false
                });
                
                const userData = { 
                    name, email, department, role, 
                    createdAt: new Date().toISOString(), 
                    emailVerified: false 
                };
                if (role === "user") { 
                    userData.batch = batch; 
                    userData.studentId = studentId; 
                }
                await db.collection("users").doc(user.uid).set(userData);
                
                await auth.signOut();
                
                verificationDiv.innerHTML = `
                    <strong>📧 Verification Email Sent!</strong><br>
                    Please check <strong>${email}</strong> (also check spam folder).<br>
                    Click the verification link to activate your account.<br>
                    You can login only after verifying your email.
                `;
                verificationDiv.style.display = "block";
                successDiv.innerHTML = "✅ Registration successful! Verification email sent.";
                
                document.getElementById("name").value = "";
                document.getElementById("email").value = "";
                document.getElementById("password").value = "";
                document.getElementById("confirmPassword").value = "";
                document.getElementById("role").value = "";
                userFields.classList.add("hidden");
                adminFields.classList.add("hidden");
                
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 5000);
                
            } catch (error) {
                console.error("Registration Error:", error);
                if (error.code === 'auth/email-already-in-use') {
                    errorDiv.innerHTML = "Email already exists! Try login.";
                } else if (error.code === 'auth/invalid-email') {
                    errorDiv.innerHTML = "Invalid email format!";
                } else if (error.code === 'auth/weak-password') {
                    errorDiv.innerHTML = "Password is too weak!";
                } else {
                    errorDiv.innerHTML = error.message;
                }
            }
        };
    </script>
</body>
</html>
