    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%); font-family: 'Inter', sans-serif; padding: 20px; }
        .container { max-width: 750px; margin: 0 auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: white; padding: 12px 20px; border-radius: 12px; margin-bottom: 20px; }
        .logo { font-size: 18px; font-weight: bold; color: #1a1a2e; }
        .logo i { color: #2da44e; }
        .user-avatar { width: 36px; height: 36px; background: linear-gradient(135deg, #2da44e, #216e39); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .logout-btn { background: #dc3545; border: none; padding: 6px 12px; border-radius: 8px; color: white; cursor: pointer; }
        .btn-home { background: #4f46e5; border: none; padding: 8px 16px; border-radius: 8px; color: white; cursor: pointer; margin-bottom: 15px; display: inline-block; }
        .form-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .form-title { font-size: 18px; font-weight: 600; margin-bottom: 15px; border-bottom: 2px solid #2da44e; padding-bottom: 8px; display: inline-block; }
        .section-title { font-size: 14px; font-weight: 600; margin: 15px 0 10px 0; color: #2da44e; }
        .input-field { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px; font-size: 14px; }
        .input-field:focus { border-color: #2da44e; outline: none; }
        .date-group { display: flex; gap: 15px; margin-bottom: 12px; }
        .date-field { flex: 1; }
        .date-field label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
        .row-2cols { display: flex; gap: 15px; margin-bottom: 12px; }
        .row-2cols > div { flex: 1; }
        .btn-submit { background: linear-gradient(135deg, #2da44e, #216e39); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: 500; margin-top: 10px; }
        .btn-submit:hover { transform: scale(0.98); }
        .fraud-warning { background: #fff3cd; border-left: 4px solid #f59e0b; padding: 12px; border-radius: 8px; margin-top: 10px; font-size: 12px; display: none; }
        .fraud-high { background: #f8d7da; border-left-color: #dc3545; }
        .warning-text { color: #856404; }
        .info-text { font-size: 11px; color: #666; margin-top: -8px; margin-bottom: 12px; }
        .auto-field { background: #f5f5f5; cursor: default; }
        @media (max-width: 650px) { .row-2cols { flex-direction: column; gap: 0; } .date-group { flex-direction: column; gap: 0; } }

<body>
    <div class="container">
        <div class="top-bar">
            <div class="logo"><i class="fas fa-clock"></i> Permission Management</div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <div class="user-avatar" id="userAvatar"></div>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
        
        <button class="btn-home" onclick="location.href='home.html'"><i class="fas fa-arrow-left"></i> Home</button>
        
        <div class="form-card">
            <div class="form-title"><i class="fas fa-pen-alt"></i> Apply for Permission</div>
            
            <select id="adminSelect" class="input-field"><option value="">Select Administrator</option></select>
            <select id="permissionType" class="input-field">
                <option value="">Select Permission Type</option>
                <option value="Late Coming">Late Coming Permission</option>
                <option value="Early Leaving">Early Leaving Permission</option>
                <option value="Hour Leave">Hour Leave Permission</option>
                <option value="Full Day Permission">Full Day Permission</option>
                <option value="Emergency Permission">Emergency Permission</option>
            </select>
            
            <div class="date-group"><div class="date-field"><label>📅 Permission Date</label><input type="date" id="permissionDate" class="input-field"></div></div>
            
            <div class="row-2cols"><div><label>⏰ Start Time</label><input type="time" id="startTime" class="input-field"></div><div><label>⏰ End Time</label><input type="time" id="endTime" class="input-field"></div></div>
            <div id="timeError" style="color:#dc3545; font-size:12px; margin-bottom:10px;"></div>
            
            <div class="row-2cols">
                <div><label style="font-size:12px; color:#666;">📅 Day of Week (Auto)</label><input type="text" id="dayDisplay" class="input-field auto-field" readonly placeholder="Select date"></div>
                <div><label style="font-size:12px; color:#666;">🍂 Season (Auto)</label><input type="text" id="seasonDisplay" class="input-field auto-field" readonly placeholder="Select date"></div>
            </div>
            
            <div class="row-2cols">
                <div><label style="font-size:12px; color:#666;">⏱️ Permission Duration (Auto)</label><input type="text" id="durationDisplay" class="input-field auto-field" readonly placeholder="Select time"></div>
                <div><label style="font-size:12px; color:#666;">📆 Month (Auto)</label><input type="text" id="monthDisplay" class="input-field auto-field" readonly placeholder="Select date"></div>
            </div>
            <div class="info-text"><i class="fas fa-info-circle"></i> Day, Season, Duration, and Month are automatically calculated.</div>
            
            <div class="section-title"><i class="fas fa-stethoscope"></i> Reason for Permission</div>
            <textarea id="permissionReason" placeholder="Write your reason for permission here..." class="input-field" style="min-height:80px;"></textarea>
            
            <div class="section-title"><i class="fas fa-chart-line"></i> Additional Information</div>
            
            <div class="row-2cols">
                <div>
                    <label style="font-size:12px; color:#666;">💰 Transportation Expense <span style="color:#f59e0b;">(BDT/Day)</span></label>
                    <input type="number" id="transportExpensePerDay" step="10" placeholder="e.g., 200" class="input-field">
                    <div class="info-text">প্রতিদিনের পরিবহন খরচ (যেমন: 200 টাকা/দিন)</div>
                </div>
                <div><label style="font-size:12px; color:#666;">📚 Class Load (hours/day)</label><input type="number" id="classLoad" step="0.5" placeholder="e.g., 6.5" class="input-field"></div>
            </div>
            
            <div class="row-2cols">
                <div><label style="font-size:12px; color:#666;">🏠 Distance from Campus (km)</label><input type="number" id="distance" step="0.5" placeholder="e.g., 12" class="input-field"></div>
            </div>
            
            <div id="fraudWarning" class="fraud-warning"></div>
            <button class="btn-submit" onclick="submitPermission()"><i class="fas fa-paper-plane"></i> Submit Permission Request</button>
        </div>
    </div>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBtQx8RJ3QbAAxZOwthz4YqWeq-DOC5rGg",
            authDomain: "eduleave-system.firebaseapp.com",
            projectId: "eduleave-system",
            storageBucket: "eduleave-system.firebasestorage.app",
            messagingSenderId: "311349906309",
            appId: "1:311349906309:web:bf5391e233cd186943d2ec"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        
        const dayNames = { 1: "Monday", 2: "Tuesday", 3: "Wednesday", 4: "Thursday", 5: "Friday", 6: "Saturday", 7: "Sunday" };
        const seasonNames = { 1: "Spring (March-May)", 2: "Summer (June-August)", 3: "Fall (September-November)", 4: "Winter (December-February)" };
        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        
        window.logout = async function() { try { await auth.signOut(); } catch(e) {} window.location.href = "index.html"; };
        
        window.loadAdmins = async function(department) {
            if (!department) return;
            const adminsSnapshot = await db.collection("users").where("role", "==", "admin").where("department", "==", department).get();
            const adminSelect = document.getElementById("adminSelect");
            adminSelect.innerHTML = '<option value="">Select Administrator</option>';
            adminsSnapshot.forEach(doc => { const admin = doc.data(); adminSelect.innerHTML += `<option value="${admin.email}|${admin.name}">${admin.name}</option>`; });
        };
        
        function getDayOfWeekFromDate(date) { const day = new Date(date).getDay(); if (day === 0) return 7; return day; }
        function getSeasonFromDate(date) { const month = new Date(date).getMonth() + 1; if (month >= 3 && month <= 5) return 1; if (month >= 6 && month <= 8) return 2; if (month >= 9 && month <= 11) return 3; return 4; }
        function calculatePermissionDuration(startTime, endTime) { if (!startTime || !endTime) return 0; const start = startTime.split(':').map(Number); const end = endTime.split(':').map(Number); let hours = end[0] - start[0]; if (end[1] < start[1]) hours -= 1; return Math.max(hours, 0.5); }
        
        function updateAutoFields() {
            const permDate = document.getElementById("permissionDate").value;
            const startTime = document.getElementById("startTime").value;
            const endTime = document.getElementById("endTime").value;
            if (permDate) {
                const dayCode = getDayOfWeekFromDate(permDate);
                document.getElementById("dayDisplay").value = dayNames[dayCode] || "Unknown";
                const seasonCode = getSeasonFromDate(permDate);
                document.getElementById("seasonDisplay").value = seasonNames[seasonCode] || "Unknown";
                const month = new Date(permDate).getMonth();
                document.getElementById("monthDisplay").value = monthNames[month] || "Unknown";
            }
            if (startTime && endTime) {
                const duration = calculatePermissionDuration(startTime, endTime);
                document.getElementById("durationDisplay").value = duration + " hour(s)";
            } else { document.getElementById("durationDisplay").value = "Select time"; }
        }
        
        async function detectFraud(permissionData) {
            let fraudProbability = 0;
            let riskFactors = [];
            
            if (permissionData.dayOfWeek === 1 || permissionData.dayOfWeek === 5) { fraudProbability += 0.20; riskFactors.push(`Permission on ${permissionData.dayOfWeek === 1 ? "Monday" : "Friday"} (long weekend pattern)`); }
            if (permissionData.dayOfWeek === 6 || permissionData.dayOfWeek === 7) { fraudProbability += 0.10; riskFactors.push(`Permission on weekend`); }
            if (permissionData.season === 1 || permissionData.season === 4) { fraudProbability += 0.08; riskFactors.push(`Permission during ${permissionData.season === 1 ? "Spring" : "Winter"} season`); }
            if (permissionData.permissionDuration >= 4) { fraudProbability += 0.15; riskFactors.push(`Long permission duration (${permissionData.permissionDuration} hours)`); }
            if (permissionData.permissionDuration >= 6) { fraudProbability += 0.10; riskFactors.push(`Very long permission (${permissionData.permissionDuration} hours)`); }
            if (permissionData.month === 1 || permissionData.month === 6 || permissionData.month === 12) { fraudProbability += 0.10; riskFactors.push(`Permission during exam period (${monthNames[permissionData.month - 1]})`); }
            
            if (permissionData.transportExpensePerDay && permissionData.transportExpensePerDay < 100 && permissionData.permissionDuration > 3) {
                fraudProbability += 0.08;
                riskFactors.push(`Very low daily transport expense (${permissionData.transportExpensePerDay} BDT/day) with long permission`);
            }
            
            if (permissionData.classLoad && permissionData.classLoad > 7) { fraudProbability += 0.12; riskFactors.push(`High class load (${permissionData.classLoad} hrs/day)`); }
            if (permissionData.distance && permissionData.distance > 20) { fraudProbability += 0.10; riskFactors.push(`Far from campus (${permissionData.distance} km)`); }
            
            const permissionsSnapshot = await db.collection("permissions").where("userEmail", "==", permissionData.userEmail).get();
            const permsInLast30Days = permissionsSnapshot.docs.filter(doc => { const permDate = new Date(doc.data().permissionDate); return (new Date() - permDate) / (1000 * 60 * 60 * 24) <= 30; }).length;
            if (permsInLast30Days >= 3) { fraudProbability += 0.15; riskFactors.push(`${permsInLast30Days} permissions taken in last 30 days`); }
            
            fraudProbability = Math.min(Math.max(fraudProbability, 0), 0.98);
            const prediction = fraudProbability >= 0.4 ? 1 : 0;
            const riskLevel = fraudProbability >= 0.7 ? "High" : (fraudProbability >= 0.4 ? "Medium" : "Low");
            return { prediction, fraud_probability: fraudProbability, risk_level: riskLevel, risk_factors: riskFactors, fraud_score: Math.round(fraudProbability * 100) };
        }
        
        window.submitPermission = async function() {
            const user = auth.currentUser;
            if (!user) { alert("Please login"); window.location.href = "index.html"; return; }

            let startTime = document.getElementById("startTime").value;
            let endTime = document.getElementById("endTime").value;

            let transportExpensePerDay = parseInt(document.getElementById("transportExpensePerDay").value) || 0;
            let classLoad = parseFloat(document.getElementById("classLoad").value) || 0;
            let distance = parseFloat(document.getElementById("distance").value) || 0;
            
            let dayOfWeek = getDayOfWeekFromDate(permissionDate);
            let season = getSeasonFromDate(permissionDate);
            let permissionDuration = calculatePermissionDuration(startTime, endTime);
            let month = new Date(permissionDate).getMonth() + 1;
            
            if (!adminEmail || !permissionType || !permissionDate || !startTime || !endTime || !reasonText) { alert("Please fill all required fields!"); return; }
            if (startTime >= endTime) { document.getElementById("timeError").innerHTML = "End time must be after start time!"; return; }
            
            const fraudResult = await detectFraud({ userEmail: user.email, dayOfWeek, season, permissionDuration, month, transportExpensePerDay, classLoad, distance });
            
            if (fraudResult.prediction === 1) {
                document.getElementById("fraudWarning").style.display = "block";
                document.getElementById("fraudWarning").className = fraudResult.risk_level === "High" ? "fraud-warning fraud-high" : "fraud-warning";

                if (!confirm(`⚠️ Fraud Warning!\nRisk: ${fraudResult.risk_level}\nScore: ${fraudResult.fraud_score}/100\n\nSubmit anyway?`)) return;
            }
            
            await db.collection("permissions").add({
                userName: userData.name, userEmail: user.email, department: userData.department || "N/A",
                adminEmail, adminName, permissionType, permissionDate, startTime, endTime, permissionDuration, reasonText,
                dayOfWeek, season, month, transportExpensePerDay, classLoad, distanceFromCampus: distance,
                fraudScore: fraudResult.fraud_score, fraudRisk: fraudResult.risk_level,
                detectionReasons: fraudResult.risk_factors, status: "Pending", timestamp: new Date().toISOString()
            });
            
            await db.collection("notifications").add({
                type: "permission", userName: userData.name, userEmail: user.email, department: userData.department,
                adminEmail: adminEmail, details: `${permissionType} | ${permissionDate} (${permissionDuration} hrs)`,
                fraudRisk: fraudResult.risk_level, fraudScore: fraudResult.fraud_score, isRead: false, timestamp: new Date().toISOString()
            });
