<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Permission | EduLeave</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%); font-family: 'Inter', sans-serif; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: white; padding: 12px 20px; border-radius: 12px; margin-bottom: 20px; }
        .logo { font-size: 18px; font-weight: bold; color: #1a1a2e; }
        .user-avatar { width: 36px; height: 36px; background: linear-gradient(135deg, #2da44e, #216e39); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .logout-btn { background: #dc3545; border: none; padding: 6px 12px; border-radius: 8px; color: white; cursor: pointer; }
        .btn-home { background: #4f46e5; border: none; padding: 8px 16px; border-radius: 8px; color: white; cursor: pointer; margin-bottom: 15px; display: inline-block; }
        .welcome-card { background: white; border-radius: 12px; padding: 15px 20px; margin-bottom: 20px; }
        .welcome-text { color: #2da44e; font-weight: 500; }
        .form-card { background: white; border-radius: 12px; padding: 20px; }
        .form-title { font-size: 18px; font-weight: 600; margin-bottom: 15px; border-bottom: 2px solid #2da44e; padding-bottom: 8px; display: inline-block; }
        .input-field { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px; font-size: 14px; }
        .input-field:focus { border-color: #2da44e; outline: none; }
        .time-group { display: flex; gap: 15px; margin-bottom: 12px; }
        .time-field { flex: 1; }
        .time-field label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
        .quick-actions { display: flex; gap: 8px; flex-wrap: wrap; margin: 15px 0; }
        .quick-btn { background: #f8f9fa; border: 1px solid #ddd; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; }
        .quick-btn:hover { background: #2da44e; color: white; }
        .btn-submit { background: linear-gradient(135deg, #2da44e, #216e39); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: 500; margin-top: 10px; }
        @media (max-width: 550px) { .time-group { flex-direction: column; gap: 0; } body { padding: 10px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div class="logo"><i class="fas fa-key"></i> Permission Management</div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <div class="user-avatar" id="userAvatar"></div>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
        
        <button class="btn-home" onclick="location.href='home.html'"><i class="fas fa-arrow-left"></i> Home</button>
        
        <div class="welcome-card"><div class="welcome-text" id="welcomeUser"></div></div>
        
        <div class="form-card">
            <div class="form-title"><i class="fas fa-bolt"></i> Instant Permission Request</div>
            
            <select id="department" class="input-field">
                <option value="">Select Department</option>
                <option value="CSE">CSE</option><option value="EEE">EEE</option><option value="BBA">BBA</option>
                <option value="LLB">LLB</option><option value="CEN">CEN</option><option value="TEX">TEX</option>
            </select>
            
            <input type="text" id="studentName" placeholder="Your Name" class="input-field">
            
            <select id="adminSelect" class="input-field">
                <option value="">Select Administrator</option>
            </select>
            
            <select id="purposeType" class="input-field">
                <option value="">Select Purpose</option>
                <option>Medical Emergency</option><option>Personal Work</option><option>Family Event</option>
                <option>Official Work</option><option>Late Arrival</option><option>Early Departure</option>
            </select>
            
            <div class="time-group">
                <div class="time-field"><label>Start Time</label><input type="time" id="startTime" class="input-field" style="margin-bottom:0;"></div>
                <div class="time-field"><label>End Time</label><input type="time" id="endTime" class="input-field" style="margin-bottom:0;"></div>
            </div>
            
            <div class="time-field" style="margin:0;"><label>Permission Date</label><input type="date" id="permissionDate" class="input-field" style="margin-bottom:0;"></div>
            
            <div class="quick-actions">
                <button type="button" class="quick-btn" onclick="setDuration(1)">1 Hour</button>
                <button type="button" class="quick-btn" onclick="setDuration(2)">2 Hours</button>
                <button type="button" class="quick-btn" onclick="setDuration(3)">3 Hours</button>
                <button type="button" class="quick-btn" onclick="setDuration(4)">Half Day</button>
                <button type="button" class="quick-btn" onclick="setDuration(8)">Full Day</button>
            </div>
            
            <textarea id="permissionReason" placeholder="Reason for permission..." class="input-field" style="min-height:80px;"></textarea>
            
            <button class="btn-submit" onclick="submitPermission()"><i class="fas fa-paper-plane"></i> Submit Permission Request</button>
        </div>
    </div>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBtQx8RJ3QbAAxZOwthz4YqWeq-DOC5rGg",
            authDomain: "eduleave-system.firebaseapp.com",
            projectId: "eduleave-system",
            storageBucket: "eduleave-system.firebasestorage.app",
            messagingSenderId: "311349906309",
            appId: "1:311349906309:web:bf5391e233cd186943d2ec"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        
        window.logout = async function() {
            try { await auth.signOut(); } catch(e) {}
            sessionStorage.removeItem("currentUser");
            window.location.href = "index.html";
        };
        
        window.loadAdmins = async function(department) {
            if (!department) return;
            const adminsSnapshot = await db.collection("users").where("role", "==", "admin").where("department", "==", department).get();
            const adminSelect = document.getElementById("adminSelect");
            adminSelect.innerHTML = '<option value="">Select Administrator</option>';
            adminsSnapshot.forEach(doc => {
                const admin = doc.data();
                adminSelect.innerHTML += `<option value="${admin.email}|${admin.name}">${admin.name}</option>`;
            });
        };
        
        function setDuration(hours) {
            let startTime = document.getElementById("startTime").value;
            if(!startTime) { alert("Please select start time first!"); return; }
            let [startHour, startMinute] = startTime.split(':').map(Number);
            let endHour = startHour + hours;
            let endMinute = startMinute;
            if(endHour >= 24) { endHour = 23; endMinute = 59; alert("Time exceeds midnight, set to 23:59"); }
            document.getElementById("endTime").value = `${String(endHour).padStart(2, '0')}:${String(endMinute).padStart(2, '0')}`;
        }
        
        window.submitPermission = async function() {
            const user = auth.currentUser;
            if (!user) { alert("Please login again"); window.location.href = "index.html"; return; }
            
            const userDoc = await db.collection("users").doc(user.uid).get();
            const userData = userDoc.data();
            
            let department = document.getElementById("department").value;
            let name = document.getElementById("studentName").value.trim();
            let adminValue = document.getElementById("adminSelect").value;
            let [adminEmail, adminName] = adminValue ? adminValue.split("|") : [];
            let purpose = document.getElementById("purposeType").value;
            let startTime = document.getElementById("startTime").value;
            let endTime = document.getElementById("endTime").value;
            let date = document.getElementById("permissionDate").value;
            let reason = document.getElementById("permissionReason").value.trim();
            
            if (!department || !name || !adminEmail || !purpose || !startTime || !endTime || !date || !reason) {
                alert("Please fill all fields!");
                return;
            }
            if (startTime >= endTime) {
                alert("End time must be after start time!");
                return;
            }
            
            let [sh, sm] = startTime.split(':').map(Number);
            let [eh, em] = endTime.split(':').map(Number);
            let diff = (eh*60+em) - (sh*60+sm);
            let hours = Math.floor(diff/60);
            let minutes = diff%60;
            let duration = hours > 0 ? (minutes > 0 ? `${hours}h ${minutes}m` : `${hours} hour${hours>1?'s':''}`) : `${minutes} minutes`;
            
            const requestData = {
                userName: name,
                userEmail: user.email,
                department: department,
                batch: userData.batch || "",
                studentId: userData.studentId || "",
                purpose: purpose,
                startTime: startTime,
                endTime: endTime,
                date: date,
                duration: duration,
                reason: reason,
                adminEmail: adminEmail,
                adminName: adminName,
                status: "Pending",
                timestamp: new Date().toISOString()
            };
            
            try {
                await db.collection("permissions").add(requestData);
                
                // ✅ Add notification for admin
                await db.collection("notifications").add({
                    type: "permission",
                    userName: name,
                    userEmail: user.email,
                    department: department,
                    adminEmail: adminEmail,
                    requestId: Date.now().toString(),
                    details: `${purpose} | ${date} | ${startTime} → ${endTime}`,
                    reason: reason,
                    isRead: false,
                    timestamp: new Date().toISOString()
                });
                
                alert("✅ Permission request submitted! Admin will be notified.");
                
                document.getElementById("startTime").value = "";
                document.getElementById("endTime").value = "";
                document.getElementById("permissionDate").value = "";
                document.getElementById("permissionReason").value = "";
                
            } catch(e) { 
                console.error("Submit error:", e);
                alert("Failed to submit!"); 
            }
        };
        
        document.getElementById("department")?.addEventListener("change", function() {
            loadAdmins(this.value);
        });
        
        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = "index.html"; return; }
            const userDoc = await db.collection("users").doc(user.uid).get();
            const userData = userDoc.data();
            if (!userData) { window.location.href = "index.html"; return; }
            if (userData.role === "admin") { window.location.href = "admin.html"; return; }
            
            document.getElementById("userAvatar").innerHTML = userData.name.charAt(0).toUpperCase();
            document.getElementById("welcomeUser").innerHTML = ` Welcome, ${userData.name}!`;
            document.getElementById("studentName").value = userData.name;
            
            if (userData.department) {
                document.getElementById("department").value = userData.department;
                loadAdmins(userData.department);
            }
        });
    </script>
</body>
</html>
