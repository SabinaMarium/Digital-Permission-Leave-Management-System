<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Permission | EduLeave</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='68' text-anchor='middle' font-size='50'%3E🔐%3C/text%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            font-family: 'Inter', sans-serif;
            padding: 1.5rem;
            min-height: 100vh;
        }
        .container { max-width: 650px; margin: 0 auto; }
        .header-section { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem; }
        .btn-home { background: #4f46e5; border: none; border-radius: 2rem; padding: 0.6rem 1.2rem; font-weight: 600; color: white; cursor: pointer; transition: 0.2s; }
        .btn-home:hover { background: #4338ca; transform: scale(0.98); }
        h2 { color: #1a1a2e; font-size: 1.6rem; font-weight: 700; }
        .welcome-card { background: white; border-radius: 1.5rem; padding: 1.2rem 1.8rem; margin-bottom: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .welcome-text { color: #029f2e; font-weight: 600; font-size: 1.1rem; }
        .form-card { background: white; border-radius: 1.5rem; padding: 1.8rem; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .form-title { margin-bottom: 1.5rem; color: #1a1a2e; font-size: 1.3rem; font-weight: 600; border-bottom: 2px solid #029f2e; padding-bottom: 0.75rem; display: inline-block; }
        .input-field { width: 100%; padding: 0.85rem 1.2rem; border: 2px solid #e9ecef; border-radius: 1rem; font-size: 0.95rem; background: white; color: #1a1a2e; outline: none; margin-bottom: 1rem; }
        .input-field:focus { border-color: #029f2e; }
        .time-group { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
        .time-field { flex: 1; min-width: 120px; }
        .time-field label { font-size: 0.75rem; color: #6c757d; margin-bottom: 0.4rem; display: block; }
        .quick-actions { display: flex; gap: 0.6rem; flex-wrap: wrap; margin: 1rem 0; }
        .quick-btn { background: #f8f9fa; color: #029f2e; border: 2px solid #e9ecef; border-radius: 2rem; padding: 0.5rem 1.2rem; font-size: 0.8rem; cursor: pointer; transition: 0.2s; }
        .quick-btn:hover { background: #029f2e; color: white; }
        .btn-submit { background: linear-gradient(135deg, #029f2e, #028a27); border: none; border-radius: 1rem; padding: 0.9rem; font-weight: 700; font-size: 1rem; color: white; cursor: pointer; width: 100%; margin-top: 0.5rem; transition: 0.2s; }
        .btn-submit:hover { transform: translateY(-2px); }
        .btn-logout { background: #dc3545; border: none; border-radius: 1rem; padding: 0.9rem; font-weight: 600; font-size: 1rem; color: white; cursor: pointer; width: 100%; margin-top: 1rem; transition: 0.2s; }
        .btn-logout:hover { transform: translateY(-2px); }
        @media (max-width: 480px) { body { padding: 1rem; } .time-group { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-section">
            <button class="btn-home" onclick="location.href='home.html'"><i class="fas fa-arrow-left"></i> Home</button>
            <h2><i class="fas fa-key"></i> Permission Management</h2>
            <div style="width: 70px;"></div>
        </div>
        <div class="welcome-card"><div class="welcome-text" id="welcomeUser"></div></div>
        <div class="form-card">
            <div class="form-title"><i class="fas fa-bolt"></i> Instant Permission Request</div>
            <input type="text" id="studentName" placeholder="Full name" class="input-field">
            <select id="purposeType" class="input-field">
                <option value="">Select Purpose</option>
                <option>Medical Emergency</option><option>Personal Work</option><option>Family Event</option>
                <option>Official Work</option><option>Late Arrival</option><option>Early Departure</option>
            </select>
            <div class="time-group">
                <div class="time-field"><label><i class="fas fa-hourglass-start"></i> Start Time</label><input type="time" id="startTime" class="input-field" style="margin-bottom:0;"></div>
                <div class="time-field"><label><i class="fas fa-hourglass-end"></i> End Time</label><input type="time" id="endTime" class="input-field" style="margin-bottom:0;"></div>
            </div>
            <div class="time-field" style="margin:0.5rem 0;"><label><i class="far fa-calendar-alt"></i> Permission Date</label><input type="date" id="permissionDate" class="input-field" style="margin-bottom:0;"></div>
            <div class="quick-actions">
                <button type="button" class="quick-btn" onclick="setDuration(1)">1 Hour</button>
                <button type="button" class="quick-btn" onclick="setDuration(2)">2 Hours</button>
                <button type="button" class="quick-btn" onclick="setDuration(3)">3 Hours</button>
                <button type="button" class="quick-btn" onclick="setDuration(4)">Half Day</button>
                <button type="button" class="quick-btn" onclick="setDuration(8)">Full Day</button>
            </div>
            <textarea id="permissionReason" placeholder="Reason for permission..." class="input-field" style="min-height:100px;"></textarea>
            <button class="btn-submit" onclick="submitPermission()"><i class="fas fa-paper-plane"></i> Submit Permission Request</button>
        </div>
        <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
    <script src="script.js"></script>
    <script>
        function setDuration(hours) {
            let startTime = document.getElementById("startTime").value;
            if(!startTime) { alert("Please select start time first!"); return; }
            let [startHour, startMinute] = startTime.split(':').map(Number);
            let endHour = startHour + hours;
            let endMinute = startMinute;
            if(endHour >= 24) { endHour = 23; endMinute = 59; alert("Time exceeds midnight, set to 23:59"); }
            let formattedEnd = `${String(endHour).padStart(2, '0')}:${String(endMinute).padStart(2, '0')}`;
            document.getElementById("endTime").value = formattedEnd;
        }
    </script>
</body>
</html>
