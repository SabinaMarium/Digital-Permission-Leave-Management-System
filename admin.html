<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | EduLeave</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='68' text-anchor='middle' font-size='50'%3E👑%3C/text%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            font-family: 'Inter', sans-serif;
            padding: 1.5rem;
            min-height: 100vh;
        }
        .admin-container { max-width: 1000px; margin: 0 auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: #1e1e1e; padding: 1rem 1.5rem; border-radius: 1rem; margin-bottom: 1.5rem; border: 1px solid rgba(255,255,255,0.08); }
        .logo { font-size: 1.3rem; font-weight: 700; background: linear-gradient(135deg, #fff, #a1a1aa); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .top-buttons { display: flex; gap: 10px; align-items: center; }
        .notification-icon { position: relative; cursor: pointer; font-size: 1.5rem; background: none; border: none; color: white; }
        .badge { position: absolute; top: -8px; right: -12px; background: #ef4444; color: white; border-radius: 50%; padding: 2px 6px; font-size: 0.7rem; }
        .notification-dropdown { position: absolute; right: 0; top: 45px; width: 320px; background: #1e1e1e; border-radius: 1rem; border: 1px solid #333; z-index: 100; max-height: 400px; overflow-y: auto; display: none; }
        .notification-item { padding: 12px 15px; border-bottom: 1px solid #333; cursor: pointer; }
        .notification-item:hover { background: #2a2a2a; }
        .notification-item.unread { background: #1a3a1a; border-left: 3px solid #029f2e; }
        .position-relative { position: relative; }
        .records-btn, .logout-btn { background: #029f2e; padding: 8px 20px; border: none; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; }
        .logout-btn { background: #EF4444; }
        .tab-bar { display: flex; gap: 10px; margin-bottom: 1.5rem; }
        .tab-btn { flex: 1; background: #1e1e1e; color: #a1a1aa; border: 1px solid #333; padding: 12px; border-radius: 12px; cursor: pointer; }
        .tab-btn.active { background: #029f2e; color: white; }
        .filter-bar { display: flex; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .filter-bar input, .filter-bar select { flex: 1; padding: 10px 14px; border: 1px solid #333; border-radius: 40px; background: #2a2a2a; color: white; outline: none; }
        .request-card { background: #1e1e1e; border-radius: 1rem; padding: 1rem; margin-bottom: 1rem; border: 1px solid #333; border-left: 4px solid #029f2e; }
        .status-badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; }
        .status-pending { background: #78350f; color: #fde68a; }
        .status-approved { background: #064e3b; color: #6ee7b7; }
        .status-rejected { background: #7f1a1a; color: #fca5a5; }
        .comment-input-area { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .comment-input-area input { flex: 2; padding: 8px 12px; border-radius: 40px; background: #2a2a2a; border: 1px solid #333; color: white; }
        .approve-btn { background: #029f2e; color: white; border: none; padding: 6px 16px; border-radius: 40px; cursor: pointer; }
        .reject-btn { background: #EF4444; color: white; border: none; padding: 6px 16px; border-radius: 40px; cursor: pointer; }
        .empty-state { text-align: center; padding: 3rem; color: #6b7280; background: #1e1e1e; border-radius: 1rem; }
        @media (max-width: 600px) { .filter-bar { flex-direction: column; } .comment-input-area { flex-direction: column; } .top-buttons { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="top-bar">
            <div class="logo">👑 Admin Dashboard</div>
            <div class="top-buttons">
                <div class="position-relative">
                    <button class="notification-icon" onclick="toggleNotifications()">🔔</button>
                    <span id="notifBadge" class="badge" style="display:none;">0</span>
                    <div id="notificationDropdown" class="notification-dropdown"></div>
                </div>
                <button class="records-btn" onclick="location.href='records.html'">📊 Records</button>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('leave')">📋 Leave Requests</button>
            <button class="tab-btn" onclick="switchTab('permission')">🔐 Permission Requests</button>
        </div>
        <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="Search..." onkeyup="filterRequests()">
            <select id="statusFilter" onchange="filterRequests()">
                <option value="all">All Status</option>
                <option value="Pending">Pending</option>
                <option value="Approved">Approved</option>
                <option value="Rejected">Rejected</option>
            </select>
        </div>
        <div id="requestsList"></div>
    </div>
    <script src="script.js"></script>
    <script>
        (function() { emailjs.init("mZbglbhb9gK8rsSLM"); })();

        let currentTab = 'leave';
        let allLeaves = [], allPermissions = [];

        function sendEmailToUser(userEmail, userName, requestType, details, status, adminComment) {
            let templateParams = {
                to_email: userEmail,
                user_name: userName,
                request_type: requestType,
                request_details: details,
                status: status,
                admin_comment: adminComment
            };
            let templateId = status === 'Approved' ? 'template_approved' : 'template_rejected';
            emailjs.send("service_4t1o4bt", templateId, templateParams)
                .then(function(response) { console.log("Email sent to user!", response); })
                .catch(function(error) { console.log("Email failed:", error); });
        }

        function updateNotificationBadge() {
            let notifs = JSON.parse(localStorage.getItem("notifications")) || [];
            let unread = notifs.filter(n => !n.read).length;
            let badge = document.getElementById("notifBadge");
            if(unread > 0) { badge.innerText = unread; badge.style.display = "inline-block"; }
            else { badge.style.display = "none"; }
        }

        function toggleNotifications() {
            let dropdown = document.getElementById("notificationDropdown");
            if(dropdown.style.display === "block") { dropdown.style.display = "none"; return; }
            let notifs = JSON.parse(localStorage.getItem("notifications")) || [];
            notifs.sort((a,b) => b.timestamp - a.timestamp);
            dropdown.innerHTML = notifs.length === 0 ? "<div style='padding:12px; text-align:center;'>No notifications</div>" : 
                notifs.map(n => `<div class="notification-item ${n.read ? '' : 'unread'}" onclick="markReadAndView(${n.id})">
                    <strong>${n.type === 'leave' ? '📋 Leave' : '🔐 Permission'}</strong><br>👤 ${n.userName}<br><small>${new Date(n.timestamp).toLocaleString()}</small>
                </div>`).join('');
            dropdown.style.display = "block";
        }

        function markReadAndView(id) {
            let notifs = JSON.parse(localStorage.getItem("notifications")) || [];
            let idx = notifs.findIndex(n => n.id === id);
            if(idx !== -1) { notifs[idx].read = true; localStorage.setItem("notifications", JSON.stringify(notifs)); }
            updateNotificationBadge();
            document.getElementById("notificationDropdown").style.display = "none";
            filterRequests();
        }

        function switchTab(tab) { currentTab = tab; document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active')); document.querySelector(`.tab-btn:first-child`).classList.toggle('active', tab==='leave'); document.querySelector(`.tab-btn:last-child`).classList.toggle('active', tab==='permission'); loadData(); filterRequests(); }
        function loadData() { allLeaves = JSON.parse(localStorage.getItem("leaves")) || []; allPermissions = JSON.parse(localStorage.getItem("permissions")) || []; }
        function getCurrentRequests() { return currentTab === 'leave' ? [...allLeaves] : [...allPermissions]; }

        function updateRequestStatus(index, newStatus, comment) {
            if(!comment.trim()) { alert("⚠️ Please write a comment!"); return; }
            let actionBy = JSON.parse(localStorage.getItem("currentUser"));
            let adminName = actionBy ? actionBy.name : "Admin";
            let userEmail = "", userName = "", requestDetails = "", requestType = "";
            
            if(currentTab === 'leave' && allLeaves[index]) {
                userEmail = allLeaves[index].userEmail; userName = allLeaves[index].userName;
                requestDetails = `${allLeaves[index].from} → ${allLeaves[index].to}`;
                requestType = "Leave Request";
                allLeaves[index].status = newStatus; allLeaves[index].adminComment = comment;
                allLeaves[index].adminName = adminName; allLeaves[index].actionDate = new Date().toLocaleString();
                localStorage.setItem("leaves", JSON.stringify(allLeaves));
                sendEmailToUser(userEmail, userName, requestType, requestDetails, newStatus, comment);
            } 
            else if(currentTab === 'permission' && allPermissions[index]) {
                userEmail = allPermissions[index].userEmail; userName = allPermissions[index].userName;
                requestDetails = `${allPermissions[index].date} | ${allPermissions[index].startTime} → ${allPermissions[index].endTime}`;
                requestType = "Permission Request";
                allPermissions[index].status = newStatus; allPermissions[index].adminComment = comment;
                allPermissions[index].adminName = adminName; allPermissions[index].actionDate = new Date().toLocaleString();
                localStorage.setItem("permissions", JSON.stringify(allPermissions));
                sendEmailToUser(userEmail, userName, requestType, requestDetails, newStatus, comment);
            }
            
            let notifs = JSON.parse(localStorage.getItem("notifications")) || [];
            notifs = notifs.filter(n => n.userEmail !== userEmail);
            localStorage.setItem("notifications", JSON.stringify(notifs));
            loadData(); filterRequests(); updateNotificationBadge();
            alert(`✅ Request ${newStatus} with comment: "${comment}"`);
        }

        function filterRequests() {
            let searchTerm = document.getElementById("searchInput")?.value.toLowerCase() || "";
            let statusFilter = document.getElementById("statusFilter")?.value || "all";
            let requests = getCurrentRequests().filter(r => (r.userName || "").toLowerCase().includes(searchTerm) || (r.userEmail || "").toLowerCase().includes(searchTerm))
                .filter(r => statusFilter === "all" || r.status === statusFilter);
            renderRequests(requests);
        }

        function renderRequests(requests) {
            let container = document.getElementById("requestsList");
            if(!container) return;
            container.innerHTML = requests.length === 0 ? `<div class="empty-state">✨ No ${currentTab} requests found.</div>` : "";
            requests.forEach((req, idx) => {
                let originalIndex = (currentTab === 'leave' ? allLeaves : allPermissions).findIndex(r => r.timestamp === req.timestamp && r.userEmail === req.userEmail);
                let div = document.createElement("div"); div.className = "request-card";
                let statusClass = req.status === "Approved" ? "status-approved" : (req.status === "Rejected" ? "status-rejected" : "status-pending");
                let detailsHtml = currentTab === 'leave' ? 
                    `<div>📅 ${req.from} → ${req.to}</div><div>📝 ${req.reason || "No reason"}</div>` :
                    `<div>📅 ${req.date} | ⏰ ${req.startTime} → ${req.endTime} | ⏱️ ${req.duration}</div><div>🎯 ${req.purpose}</div><div>📝 ${req.reason || "No reason"}</div>`;
                let adminCommentHtml = req.adminComment ? `<div style="background:#78350f; padding:8px; border-radius:12px; margin-top:8px;">💬 ${req.adminComment}</div>` : "";
                let actionHtml = (req.status !== "Approved" && req.status !== "Rejected") ? 
                    `<div class="comment-input-area"><input type="text" id="comment-${originalIndex}" placeholder="Write comment..."><button class="approve-btn" onclick="submitWithComment(${originalIndex},'Approved')">✓ Approve</button><button class="reject-btn" onclick="submitWithComment(${originalIndex},'Rejected')">✗ Reject</button></div>` : "";
                div.innerHTML = `<div><strong>${req.userName}</strong> <span style="font-size:0.7rem;">${req.userEmail}</span> <span class="status-badge ${statusClass}">${req.status || "Pending"}</span></div>${detailsHtml}${adminCommentHtml}${actionHtml}`;
                container.appendChild(div);
            });
        }

        function submitWithComment(index, action) {
            let comment = document.getElementById(`comment-${index}`)?.value.trim();
            if(!comment) { alert("Please write a comment!"); return; }
            updateRequestStatus(index, action, comment);
        }

        setInterval(updateNotificationBadge, 5000);
        window.onload = function() {
            let current = JSON.parse(localStorage.getItem("currentUser"));
            if(!current || current.role !== "admin") { alert("Admin access only!"); location.href="index.html"; return; }
            loadData(); filterRequests(); updateNotificationBadge();
        };
    </script>
</body>
</html>
