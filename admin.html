    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0f2f5; font-family: 'Inter', sans-serif; padding: 20px; min-height: 100vh; }
        .admin-container { max-width: 1400px; margin: 0 auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 25px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        .logo i { color: #2da44e; margin-right: 8px; }
        .header-right { display: flex; align-items: center; gap: 20px; position: relative; }
        
        /* Notification Styles */
        .notification-icon { position: relative; cursor: pointer; font-size: 24px; color: #555; padding: 8px; border-radius: 50%; transition: 0.2s; }
        .notification-icon:hover { background: #e8f5e9; color: #2da44e; }
        .notification-badge { position: absolute; top: -5px; right: -8px; background: #dc3545; color: white; border-radius: 50%; padding: 2px 6px; font-size: 11px; font-weight: bold; min-width: 20px; text-align: center; box-shadow: 0 0 0 2px white; }
        .notification-dropdown { position: absolute; right: 0; top: 45px; width: 380px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); display: none; z-index: 1000; max-height: 450px; overflow-y: auto; border: 1px solid #e0e0e0; }

        .notification-item:hover { background: #f8f9fa; }

        .notification-time { font-size: 10px; color: #999; margin-top: 5px; }

        .mark-read-btn:hover { background: #d4edda; }
        
        .admin-avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #2da44e, #216e39); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 16px; cursor: pointer; }

        .welcome-card { background: linear-gradient(135deg, #2da44e, #216e39); color: white; padding: 20px 25px; border-radius: 12px; margin-bottom: 20px; }
        .welcome-card h2 { font-size: 20px; margin-bottom: 5px; }
        .welcome-card p { font-size: 13px; opacity: 0.9; }
        .dept-badge { background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 20px; font-size: 12px; display: inline-block; margin-top: 8px; }
        .email-status { background: rgba(255,255,255,0.15); padding: 5px 10px; border-radius: 20px; font-size: 11px; margin-left: 10px; display: inline-block; }
        
        .dashboard-layout { display: flex; gap: 25px; flex-wrap: wrap; }
        .sidebar { flex: 1; min-width: 280px; }
        .main-content { flex: 3; min-width: 350px; }
        
        .profile-card { background: white; border-radius: 16px; padding: 20px; text-align: center; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .profile-avatar { width: 70px; height: 70px; background: linear-gradient(135deg, #2da44e, #216e39); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }

        .btn-profile:hover { opacity: 0.9; transform: scale(0.98); }
        
        .records-card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .records-card h3 { font-size: 15px; margin-bottom: 15px; border-bottom: 2px solid #e0e0e0; padding-bottom: 8px; }

        .btn-history { background: #4f46e5; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 500; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .filter-bar { display: flex; gap: 15px; flex-wrap: wrap; background: white; padding: 15px 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        .filter-btn { background: #4f46e5; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; border: none; font-weight: 500; transition: 0.2s; }
        .filter-btn:hover { opacity: 0.9; transform: scale(0.98); }
        
        .requests-container { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .section-title { font-size: 16px; font-weight: 600; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #e0e0e0; }
        .request-card { background: #f8f9fa; border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 4px solid #2da44e; transition: 0.2s; }
        .request-card:hover { transform: translateX(3px); }
        .request-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
        .user-name { font-weight: bold; font-size: 15px; }
        .user-email { font-size: 11px; color: #666; margin-top: 2px; }
        .user-dept { font-size: 11px; color: #2da44e; margin-top: 2px; }
        .status-badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; display: inline-block; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-approved { background: #d4edda; color: #155724; }
        .status-rejected { background: #f8d7da; color: #721c24; }
        .request-details { font-size: 12px; color: #555; margin: 10px 0; line-height: 1.5; }
        .comment-input { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .comment-input input { flex: 2; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 12px; outline: none; }
        .comment-input input:focus { border-color: #2da44e; }
        .approve-btn { background: #2da44e; color: white; border: none; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .approve-btn:hover { opacity: 0.9; }
        .reject-btn { background: #dc3545; color: white; border: none; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .reject-btn:hover { opacity: 0.9; }
        .admin-comment { background: #fff8e7; padding: 8px 12px; border-radius: 8px; margin-top: 8px; font-size: 11px; border-left: 3px solid #ffc107; }
        .empty-state { text-align: center; padding: 40px; color: #888; }
        
        .analytics-card { background: white; border-radius: 16px; padding: 20px; margin-top: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .analytics-card h3 { font-size: 16px; margin-bottom: 15px; border-bottom: 2px solid #e0e0e0; padding-bottom: 10px; }
        .chart-container { margin-top: 15px; }
        canvas { max-height: 300px; width: 100% !important; }
        
        .hidden { display: none; }
        .position-relative { position: relative; }
        
        @media (max-width: 1000px) { .dashboard-layout { flex-direction: column; } }
        @media (max-width: 600px) { .filter-bar { flex-direction: column; } .comment-input { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="header">
            <div class="logo"><i class="fas fa-crown"></i> Admin Dashboard</div>
            <div class="header-right">
                <div class="position-relative">
                    <div class="notification-icon" onclick="toggleNotifications()">
                        <i class="fas fa-bell"></i>
                        <span id="notifBadge" class="notification-badge" style="display:none;">0</span>
                    </div>
                    <div id="notificationDropdown" class="notification-dropdown"></div>
                </div>
                <div class="admin-avatar" id="adminAvatar">A</div>
                <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
        
        <div class="welcome-card">
            <h2>Welcome, <span id="adminName">Admin</span>!</h2>
            <p>You are managing <strong id="deptName">your department</strong> department</p>
            <div class="dept-badge" id="deptBadge"><i class="fas fa-building"></i> Loading...</div>
            <span class="email-status" id="emailStatus"><i class="fas fa-envelope"></i> Email: ✅ Ready</span>
        </div>
        
        <div class="dashboard-layout">
            <div class="sidebar">
                <div class="profile-card">
                    <div class="profile-avatar" id="profileAvatar"><span>A</span></div>
                    <div class="profile-name" id="profileName">Admin</div>
                    <div class="profile-email" id="profileEmail">admin@example.com</div>
                    <button class="btn-profile" onclick="location.href='profile.html'"><i class="fas fa-user-edit"></i> Edit Profile</button>
                </div>
                
                <div class="records-card">
                    <h3><i class="fas fa-chart-line"></i> Student Analytics</h3>
                    <select id="studentSelect" class="student-select">
                        <option value="all">Select a student</option>
                    </select>
                    <button class="btn-analytics" onclick="loadStudentAnalytics()"><i class="fas fa-chart-line"></i> View Analytics</button>
                    <button class="btn-history" onclick="viewStudentHistory()"><i class="fas fa-history"></i> View Full History</button>
                </div>
            </div>
            
            <div class="main-content">
                <div class="filter-bar">
                    <select id="typeFilter">
                        <option value="all">All Types</option>
                        <option value="leave">Leave Requests</option>
                        <option value="permission">Permission Requests</option>
                    </select>
                    <select id="statusFilter">

                        <option value="Pending">Pending</option>

                    </select>
                    <button class="filter-btn" onclick="filterRequests()"><i class="fas fa-filter"></i> Apply Filter</button>

                <div class="requests-container">

                    <h3><i class="fas fa-chart-line"></i> Monthly Leave Analytics</h3>
                    <div class="chart-container"><canvas id="monthlyChart"></canvas></div>
                    <div class="chart-note" style="font-size: 11px; color: #888; margin-top: 10px; text-align: center;">Showing monthly leave requests</div>
                </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBtQx8RJ3QbAAxZOwthz4YqWeq-DOC5rGg",
            authDomain: "eduleave-system.firebaseapp.com",
            projectId: "eduleave-system",
            storageBucket: "eduleave-system.firebasestorage.app",
            messagingSenderId: "311349906309",
            appId: "1:311349906309:web:bf5391e233cd186943d2ec"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        
        let adminDepartment = null, adminName = null, adminEmail = null;
        let allLeaves = [], allPermissions = [];
        let studentsList = [];
        let monthlyChart = null;
        
        // ============ LOCAL NOTIFICATION SYSTEM (Bell Icon) ============
        
        function getNotifications() {
            const stored = localStorage.getItem("adminNotifications");
            return stored ? JSON.parse(stored) : [];
        }
        
        function saveNotifications(notifications) {
            localStorage.setItem("adminNotifications", JSON.stringify(notifications));
        }
        
        function addNotification(request) {
            let notifications = getNotifications();
            if (notifications.some(n => n.requestId === request.id)) return;
            
            const details = request.type === "leave" 
                ? `${request.type || request.leaveType} | ${request.fromDate} → ${request.toDate}`
                : `${request.purpose} | ${request.date} | ${request.startTime} → ${request.endTime}`;
            
            notifications.unshift({
                id: Date.now(),
                type: request.type === "leave" ? "leave" : "permission",
                userName: request.userName,
                userEmail: request.userEmail,
                details: details,
                reason: request.reason || "No reason",
                requestId: request.id,
                timestamp: new Date().toISOString(),
                isRead: false
            });
            
            saveNotifications(notifications);
            updateBadge();
        }
        
        function loadPendingRequestsAsNotifications() {
            const pendingLeaves = allLeaves.filter(l => l.status === "Pending");
            const pendingPermissions = allPermissions.filter(p => p.status === "Pending");
            [...pendingLeaves, ...pendingPermissions].forEach(req => addNotification(req));
        }
        
        function updateBadge() {
            const notifications = getNotifications();
            const unreadCount = notifications.filter(n => !n.isRead).length;
            const badge = document.getElementById("notifBadge");
            if (unreadCount > 0) {
                badge.innerText = unreadCount;
                badge.style.display = "inline-block";
            } else {
                badge.style.display = "none";
            }
        }
        
        function getTimeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            if (seconds < 60) return "Just now";
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes} min ago`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours} hour${hours > 1 ? 's' : ''} ago`;
            const days = Math.floor(hours / 24);
            return `${days} day${days > 1 ? 's' : ''} ago`;
        }
        
        function renderDropdown() {
            const dropdown = document.getElementById("notificationDropdown");
            const notifications = getNotifications();
            
            if (notifications.length === 0) {
                dropdown.innerHTML = `<div style="padding:40px;text-align:center;color:#888;"><i class="fas fa-bell-slash"></i><br>No notifications</div>`;
                return;
            }
            
            let html = '';
            notifications.forEach(n => {
                const date = new Date(n.timestamp);
                const timeAgo = getTimeAgo(date);
                const icon = n.type === 'leave' ? '📋' : '🔐';
                const typeText = n.type === 'leave' ? 'Leave Request' : 'Permission Request';
                
                html += `
                    <div class="notification-item ${n.isRead ? '' : 'unread'}" onclick="markAsRead('${n.id}', '${n.requestId}')">
                        <div class="notification-header">
                            <span class="notification-title">${icon} ${typeText}</span>
                            <button class="mark-read-btn" onclick="event.stopPropagation(); markAsRead('${n.id}', '${n.requestId}')">✓ Mark read</button>
                        </div>
                        <div class="notification-user">👤 ${n.userName}</div>
                        <div class="notification-details">📝 ${n.details}</div>
                        <div class="notification-time">🕐 ${timeAgo}</div>
                    </div>
                `;
            });
            dropdown.innerHTML = html;
        }
        
        window.toggleNotifications = function() {
            const dropdown = document.getElementById("notificationDropdown");
            if (dropdown.style.display === "block") {
                dropdown.style.display = "none";
                return;
            }
            renderDropdown();
            dropdown.style.display = "block";
        };
        
        window.markAsRead = function(id, requestId) {
            let notifications = getNotifications();
            notifications = notifications.map(n => n.id == id ? { ...n, isRead: true } : n);
            saveNotifications(notifications);
            updateBadge();
            
            if (requestId) {
                const el = document.getElementById(`request-${requestId}`);
                if (el) {
                    el.scrollIntoView({ behavior: 'smooth' });
                    el.style.backgroundColor = '#e8f5e9';
                    setTimeout(() => el.style.backgroundColor = '', 2000);
                }
            }
            const dropdown = document.getElementById("notificationDropdown");
            if (dropdown.style.display === "block") renderDropdown();
        };
        
        // ============ EMAIL NOTIFICATION ============
        
        // Email to Student when Admin approves/rejects
        async function sendEmailToStudent(studentEmail, studentName, requestType, status, details, adminComment) {
            if (!studentEmail) return false;
            try {
                const templateParams = {
                    from_name: `EduLeave System`,
                    from_email: adminEmail,
                    to_email: studentEmail,
                    subject: `📋 Your ${requestType} has been ${status}`,
                    message: `Dear ${studentName},\n\nYour ${requestType} has been ${status}.\n\nDetails: ${details}\n\nAdmin Comment: ${adminComment}\n\nThank you,\nEduLeave System`
                };
                await emailjs.send(EMAILJS_SERVICE_ID, "contact_form", templateParams);
                console.log("📧 Email sent to student:", studentEmail);
                return true;
            } catch(e) {
                console.error("Email error to student:", e);
                return false;
            }
        }
        
        // ============ WATCH FOR NEW REQUESTS ============
        
        function watchNewRequests() {
            if (!adminDepartment || !adminEmail) return;
            
            db.collection("leaves").where("department", "==", adminDepartment).onSnapshot((snapshot) => {
                snapshot.docChanges().forEach(change => {
                    if (change.type === "added") {
                        const data = change.doc.data();
                        if (data.status === "Pending") {
                            const details = `${data.type} | ${data.fromDate} → ${data.toDate}`;
                            addNotification({ id: change.doc.id, ...data, type: "leave" });
                            updateBadge();
                        }
                    }
                });
                loadRequests();
            });
            
            db.collection("permissions").where("department", "==", adminDepartment).onSnapshot((snapshot) => {
                snapshot.docChanges().forEach(change => {
                    if (change.type === "added") {
                        const data = change.doc.data();
                        if (data.status === "Pending") {
                            const details = `${data.purpose} | ${data.date} | ${data.startTime} → ${data.endTime}`;
                            addNotification({ id: change.doc.id, ...data, type: "permission" });
                            updateBadge();
                        }
                    }
                });
                loadRequests();
            });
        }
        
        // ============ LOAD DATA ============
        
        async function loadStudents() {
            const snap = await db.collection("users").where("role", "==", "user").where("department", "==", adminDepartment).get();
            studentsList = [];
            snap.forEach(d => studentsList.push({ id: d.id, ...d.data() }));
            const select = document.getElementById("studentSelect");
            select.innerHTML = '<option value="all">Select a student</option>' + studentsList.map(s => `<option value="${s.email}">${s.name} (${s.batch || "N/A"})</option>`).join('');
        }
        
        window.viewStudentHistory = function() {
            const selectedEmail = document.getElementById("studentSelect").value;
            if (!selectedEmail || selectedEmail === "all") {
                alert("Please select a student first!");
                return;
            }
            const selectedStudent = studentsList.find(s => s.email === selectedEmail);
            if (selectedStudent) {
                localStorage.setItem("selectedStudentForHistory", JSON.stringify({
                    name: selectedStudent.name,
                    email: selectedStudent.email,
                    batch: selectedStudent.batch,
                    studentId: selectedStudent.studentId
                }));
                window.location.href = `records.html?student=${encodeURIComponent(selectedEmail)}`;
            }
        };
        
        window.loadStudentAnalytics = async function() {
            const selectedEmail = document.getElementById("studentSelect").value;
            if (!selectedEmail || selectedEmail === "all") {
                alert("Please select a student first!");
                return;
            }
            const currentStudent = studentsList.find(s => s.email === selectedEmail);
            if (!currentStudent) return;
            
            const leavesSnap = await db.collection("leaves").where("userEmail", "==", selectedEmail).get();
            const studentLeaves = [];
            leavesSnap.forEach(d => studentLeaves.push(d.data()));
            
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            const monthlyData = new Array(12).fill(0);
            
            studentLeaves.forEach(leave => {
                if (leave.fromDate) {
                    const month = new Date(leave.fromDate).getMonth();
                    monthlyData[month]++;
                }
            });
            
            const ctx = document.getElementById('monthlyChart').getContext('2d');
            if (monthlyChart) monthlyChart.destroy();
            
            monthlyChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: months,
                    datasets: [{
                        label: `${currentStudent.name}'s Leaves`,
                        data: monthlyData,
                        borderColor: '#2da44e',
                        backgroundColor: 'rgba(45, 164, 78, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.3,
                        pointRadius: 4,
                        pointBackgroundColor: '#2da44e'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: { legend: { position: 'top' } },
                    scales: { y: { beginAtZero: true, title: { display: true, text: 'Number of Leaves' } } }
                }
            });
            
            document.getElementById("analyticsCard").classList.remove("hidden");
        };
        
        async function loadRequests() {
            if (!adminDepartment) return;
            const leaves = await db.collection("leaves").where("department", "==", adminDepartment).get();
            const perms = await db.collection("permissions").where("department", "==", adminDepartment).get();
            allLeaves = []; allPermissions = [];
            leaves.forEach(d => allLeaves.push({ id: d.id, ...d.data(), type: "leave" }));
            perms.forEach(d => allPermissions.push({ id: d.id, ...d.data(), type: "permission" }));
            allLeaves.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
            allPermissions.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
            
            if (getNotifications().length === 0) {
                loadPendingRequestsAsNotifications();
            }
            updateBadge();
            filterRequests();
        }
        
        // ============ UPDATE REQUEST STATUS WITH EMAIL TO STUDENT ============
        async function updateRequestStatus(id, type, newStatus, comment) {
            if (!comment.trim()) return alert("Please write a comment!");
            const ref = type === "leave" ? db.collection("leaves").doc(id) : db.collection("permissions").doc(id);
            
            // Get request data before updating
            const docSnap = await ref.get();
            const requestData = docSnap.data();
            
            // Update status
            await ref.update({ status: newStatus, adminComment: comment, adminName: adminName, actionDate: new Date().toISOString() });
            
            // Send email to student
            let details = "";
            if (type === "leave") {
                details = `Leave from ${requestData.fromDate} → ${requestData.toDate}`;
            } else {
                details = `Permission on ${requestData.date} | ${requestData.startTime} → ${requestData.endTime}`;
            }
            
            await sendEmailToStudent(
                requestData.userEmail,
                requestData.userName,
                type === "leave" ? "Leave Request" : "Permission Request",
                newStatus,
                details,
                comment
            );
            
            // Remove notification
            let notifications = getNotifications();
            notifications = notifications.filter(n => n.requestId !== id);
            saveNotifications(notifications);
            updateBadge();
            
            alert(`✅ Request ${newStatus}! Email sent to student.`);
            loadRequests();
        }
        
        function filterRequests() {
            const type = document.getElementById("typeFilter").value;
            const status = document.getElementById("statusFilter").value;
            let reqs = [];
            if (type === "all" || type === "leave") reqs.push(...allLeaves.filter(l => status === "all" || l.status === status));
            if (type === "all" || type === "permission") reqs.push(...allPermissions.filter(p => status === "all" || p.status === status));
            renderRequests(reqs);
        }
        
        function renderRequests(requests) {
            const container = document.getElementById("requestsList");
            if (!requests.length) {
                container.innerHTML = `<div class="empty-state">No requests found</div>`;
                return;
            }
            container.innerHTML = "";
            requests.forEach(r => {
                const statusCls = r.status === "Approved" ? "status-approved" : (r.status === "Rejected" ? "status-rejected" : "status-pending");
                const details = r.type === "leave" ? 
                    `<div class="request-details"><strong>Dates:</strong> ${r.fromDate} → ${r.toDate}<br><strong>Reason:</strong> ${r.reason || "—"}</div>` :
                    `<div class="request-details"><strong>Date:</strong> ${r.date}<br><strong>Time:</strong> ${r.startTime} → ${r.endTime}<br><strong>Duration:</strong> ${r.duration}<br><strong>Reason:</strong> ${r.reason || "—"}</div>`;
                const adminCommentHtml = r.adminComment ? `<div class="admin-comment">${r.adminComment}</div>` : "";
                const actionHtml = (r.status !== "Approved" && r.status !== "Rejected") ? `
                    <div class="comment-input">
                        <input type="text" id="comment-${r.id}" placeholder="Write comment...">
                        <button class="approve-btn" onclick="updateRequestStatus('${r.id}','${r.type}','Approved',document.getElementById('comment-${r.id}').value)">Approve</button>
                        <button class="reject-btn" onclick="updateRequestStatus('${r.id}','${r.type}','Rejected',document.getElementById('comment-${r.id}').value)">Reject</button>
                    </div>` : "";
                container.innerHTML += `<div class="request-card" id="request-${r.id}">
                    <div class="request-header">
                        <div>
                            <div class="user-name">${r.userName}</div>
                            <div class="user-email">${r.userEmail}</div>
                            <div class="user-dept">${r.department} | Batch: ${r.batch || "N/A"} | ID: ${r.studentId || "N/A"}</div>
                        </div>
                        <span class="status-badge ${statusCls}">${r.status || "Pending"}</span>
                    </div>
                    ${details}
                    ${adminCommentHtml}
                    ${actionHtml}
                </div>`;
            });
        }
        
        window.logout = async () => {
            await auth.signOut();
            sessionStorage.clear();
            window.location.href = "index.html";
        };
        
        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = "index.html"; return; }
            const doc = await db.collection("users").doc(user.uid).get();
            const data = doc.data();
            if (!data || data.role !== "admin") { window.location.href = "home.html"; return; }
            
            adminDepartment = data.department;
            adminName = data.name;
            adminEmail = user.email;
            
            document.getElementById("adminName").innerHTML = adminName;
            document.getElementById("deptName").innerHTML = adminDepartment;
            document.getElementById("deptBadge").innerHTML = `<i class="fas fa-building"></i> Department: ${adminDepartment}`;
            document.getElementById("adminAvatar").innerHTML = adminName.charAt(0).toUpperCase();
            document.getElementById("profileAvatar").innerHTML = `<span>${adminName.charAt(0).toUpperCase()}</span>`;
            document.getElementById("profileName").innerHTML = adminName;
            document.getElementById("profileEmail").innerHTML = adminEmail;
            
            await loadStudents();
            await loadRequests();
            watchNewRequests();
            updateBadge();
            
            if (Notification.permission === "default") {
                Notification.requestPermission();
            }
        });
    </script>
</body>
