<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin Panel | EduLeave</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='68' text-anchor='middle' font-size='50'%3E👑%3C/text%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #ffffff; font-family: 'Inter', sans-serif; padding: 1.5rem; min-height: 100vh; }
        .admin-container { max-width: 1000px; margin: 0 auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; background: #f8f9fa; padding: 1rem 1.5rem; border-radius: 1rem; margin-bottom: 1.5rem; }
        .logo { font-size: 1.3rem; font-weight: 700; color: #1a1a2e; }
        .flex { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
        .btn { background: #029f2e; border: none; border-radius: 2rem; padding: 0.5rem 1.25rem; font-weight: 600; color: white; cursor: pointer; }
        .btn-danger { background: #dc3545; }
        .tab-bar { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .tab-btn { flex: 1; background: #f8f9fa; color: #495057; border: 1px solid #dee2e6; padding: 0.75rem; border-radius: 0.75rem; cursor: pointer; text-align: center; font-weight: 600; }
        .tab-btn.active { background: #029f2e; color: white; }
        .filter-bar { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .filter-bar input, .filter-bar select { flex: 1; padding: 0.75rem 1rem; border: 1.5px solid #dee2e6; border-radius: 2rem; font-size: 0.85rem; outline: none; background: white; }
        .request-card { background: #ffffff; border-radius: 1rem; padding: 1rem; margin-bottom: 1rem; border: 1px solid #e9ecef; border-left: 4px solid #029f2e; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
        .status-badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 2rem; font-size: 0.7rem; font-weight: 600; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-approved { background: #d4edda; color: #155724; }
        .status-rejected { background: #f8d7da; color: #721c24; }
        .text-gray { color: #6c757d; font-size: 0.8rem; }
        .comment-input-area { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.75rem; }
        .comment-input-area input { flex: 2; padding: 0.6rem 1rem; border: 1.5px solid #dee2e6; border-radius: 2rem; font-size: 0.8rem; }
        .approve-btn { background: #029f2e; color: white; border: none; padding: 0.5rem 1.25rem; border-radius: 2rem; cursor: pointer; }
        .reject-btn { background: #dc3545; color: white; border: none; padding: 0.5rem 1.25rem; border-radius: 2rem; cursor: pointer; }
        .admin-comment { background: #fff8e7; padding: 0.75rem; border-radius: 0.75rem; margin-top: 0.75rem; font-size: 0.8rem; border-left: 3px solid #ffc107; }
        .empty-state { text-align: center; padding: 3rem; color: #6c757d; background: #f8f9fa; border-radius: 1rem; }
        @media (max-width: 600px) { .filter-bar { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="top-bar">
            <div class="logo"> Admin Dashboard</div>
            <div class="flex">
                <button class="btn" onclick="location.href='records.html'">📊 Records</button>
                <button class="btn btn-danger" onclick="logout()">Logout</button>
            </div>
        </div>
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('leave')"> Leave Requests</button>
            <button class="tab-btn" onclick="switchTab('permission')">🔐 Permission Requests</button>
        </div>
        <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="🔍 Search by name or email..." onkeyup="filterRequests()">
            <select id="statusFilter" onchange="filterRequests()">
                <option value="all">All Status</option>
                <option value="Pending">⏳ Pending</option>
                <option value="Approved">✅ Approved</option>
                <option value="Rejected">❌ Rejected</option>
            </select>
        </div>
        <div id="requestsList"></div>
    </div>
    <script src="script.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyBtQx8RJ3QbAAxZOwthz4YqWeq-DOC5rGg", authDomain: "eduleave-system.firebaseapp.com", projectId: "eduleave-system", storageBucket: "eduleave-system.firebasestorage.app", messagingSenderId: "311349906309", appId: "1:311349906309:web:bf5391e233cd186943d2ec" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        
        let currentTab = 'leave';
        let allLeaves = [], allPermissions = [];
        
        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = "index.html"; return; }
            const userDoc = await db.collection("users").doc(user.uid).get();
            const userData = userDoc.data();
            if (!userData || userData.role !== "admin") { window.location.href = "index.html"; return; }
            loadData();
        });
        
        async function loadData() {
            const leavesSnap = await db.collection("leaves").orderBy("timestamp", "desc").get();
            const permsSnap = await db.collection("permissions").orderBy("timestamp", "desc").get();
            allLeaves = []; allPermissions = [];
            leavesSnap.forEach(doc => allLeaves.push({ id: doc.id, ...doc.data() }));
            permsSnap.forEach(doc => allPermissions.push({ id: doc.id, ...doc.data() }));
            filterRequests();
        }
        
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if (tab === 'leave') document.querySelector('.tab-btn:first-child').classList.add('active');
            else document.querySelector('.tab-btn:last-child').classList.add('active');
            filterRequests();
        }
        
        function getCurrentRequests() { return currentTab === 'leave' ? allLeaves : allPermissions; }
        
        async function updateRequestStatus(id, newStatus, comment) {
            if (!comment.trim()) { alert("⚠️ Please write a comment!"); return; }
            const user = auth.currentUser;
            const userDoc = await db.collection("users").doc(user.uid).get();
            const adminName = userDoc.data()?.name || "Admin";
            
            try {
                if (currentTab === 'leave') {
                    await db.collection("leaves").doc(id).update({ status: newStatus, adminComment: comment, adminName: adminName, actionDate: new Date().toISOString() });
                } else {
                    await db.collection("permissions").doc(id).update({ status: newStatus, adminComment: comment, adminName: adminName, actionDate: new Date().toISOString() });
                }
                await loadData();
                alert(`✅ Request ${newStatus} with comment: "${comment}"`);
            } catch(e) { alert("Failed to update!"); }
        }
        
        function filterRequests() {
            let searchTerm = document.getElementById("searchInput")?.value.toLowerCase() || "";
            let statusFilter = document.getElementById("statusFilter")?.value || "all";
            let requests = getCurrentRequests().filter(r => 
                (r.userName || "").toLowerCase().includes(searchTerm) || 
                (r.userEmail || "").toLowerCase().includes(searchTerm)
            ).filter(r => statusFilter === "all" || r.status === statusFilter);
            renderRequests(requests);
        }
        
        function renderRequests(requests) {
            let container = document.getElementById("requestsList");
            if (!container) return;
            container.innerHTML = requests.length === 0 ? `<div class="empty-state">✨ No ${currentTab} requests found.</div>` : "";
            requests.forEach((req) => {
                let statusClass = req.status === "Approved" ? "status-approved" : (req.status === "Rejected" ? "status-rejected" : "status-pending");
                let detailsHtml = currentTab === 'leave' ? 
                    `<div class="text-gray">📅 ${req.from} → ${req.to}</div><div>📝 ${req.reason || "No reason"}</div>` :
                    `<div class="text-gray">📅 ${req.date} | ⏰ ${req.startTime} → ${req.endTime} | ⏱️ ${req.duration}</div>
                     <div>🎯 ${req.purpose}</div><div>📝 ${req.reason || "No reason"}</div>`;
                let adminHtml = req.adminComment ? `<div class="admin-comment">💬 ${req.adminComment}</div>` : "";
                let actionHtml = (req.status !== "Approved" && req.status !== "Rejected") ? 
                    `<div class="comment-input-area">
                        <input type="text" id="comment-${req.id}" placeholder="Write comment...">
                        <button class="approve-btn" onclick="submitWithComment('${req.id}','Approved')">✓ Approve</button>
                        <button class="reject-btn" onclick="submitWithComment('${req.id}','Rejected')">✗ Reject</button>
                    </div>` : "";
                container.innerHTML += `
                    <div class="request-card">
                        <div class="flex-between">
                            <div><strong>${req.userName}</strong> <span class="text-gray">${req.userEmail}</span></div>
                            <span class="status-badge ${statusClass}">${req.status || "Pending"}</span>
                        </div>
                        ${detailsHtml}
                        ${adminHtml}
                        ${actionHtml}
                    </div>
                `;
            });
        }
        
        function submitWithComment(id, action) {
            let comment = document.getElementById(`comment-${id}`)?.value.trim();
            if (!comment) { alert("Please write a comment!"); return; }
            updateRequestStatus(id, action, comment);
        }
    </script>
</body>
</html>
